<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Streak">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Streak · Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#58cc02; --green-dark:#46a302; --green-tint:#eafadb;
    --blue:#1cb0f6;  --blue-dark:#1690cc;  --blue-tint:#e2f5ff;
    --purple:#ce82ff;--purple-dark:#a568cc;--purple-tint:#f4e9ff;
    --orange:#ff9600;--orange-dark:#cc7800;--orange-tint:#fff0db;
    --red:#ff4b4b;   --red-dark:#d43a3a;   --red-tint:#ffe6e6;
    --yellow:#ffc800;--yellow-dark:#e0a800;--yellow-tint:#fff6d6;
    --teal:#00cd9c;  --teal-dark:#00a37d;  --teal-tint:#d9fbf2;
    --pink:#ff86d0;  --pink-dark:#d96bad;  --pink-tint:#ffe7f6;

    --fire:#ff9600;
    --text:#3c3c3c; --muted:#afafaf; --line:#e5e5e5; --bg:#ffffff; --card:#ffffff;
    --soft:#f7f7f7;
    --r:18px;
    font-family:'Nunito',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--soft);color:var(--text);}
  body{font-family:'Nunito',system-ui,sans-serif;font-weight:700;overscroll-behavior-y:contain;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}

  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--soft);
       display:flex;flex-direction:column;position:relative;}

  /* ---------- Header ---------- */
  header{padding:20px 18px 14px;background:var(--bg);border-bottom:2px solid var(--line);
         position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .brand .logo{font-size:24px;}
  .brand h1{font-size:20px;font-weight:900;margin:0;letter-spacing:-.3px;}
  .summary{display:flex;align-items:center;gap:16px;}
  .ring{position:relative;width:64px;height:64px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;line-height:1;}
  .ring .ring-num{font-size:16px;font-weight:900;}
  .ring .ring-sub{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .flamebox{display:flex;align-items:center;gap:10px;background:#fff4e5;
        border:2px solid #ffe1bd;border-radius:14px;padding:10px 14px;flex:1;}
  .flamebox .big{font-size:30px;line-height:1;}
  .flamebox .num{font-size:24px;font-weight:900;color:var(--fire);line-height:1;}
  .flamebox .lbl{font-size:11px;font-weight:800;color:#c98a3a;text-transform:uppercase;letter-spacing:.4px;}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:8px;padding:12px 18px 4px;background:var(--bg);position:sticky;
        top:0;z-index:19;}
  .tab{flex:1;padding:10px;border-radius:12px;font-weight:800;font-size:14px;color:var(--muted);
       background:var(--soft);transition:.15s;}
  .tab.active{color:var(--green-dark);background:var(--green-tint);}

  /* ---------- Content ---------- */
  main{flex:1;padding:14px 16px 120px;}
  .alldone{display:flex;align-items:center;gap:10px;background:var(--green-tint);
        border:2px solid #c5eb9e;border-radius:14px;padding:12px 14px;margin-bottom:14px;
        font-weight:800;color:var(--green-dark);font-size:14px;}

  /* habit card */
  .habit{display:flex;align-items:center;gap:12px;background:var(--card);
        border:2px solid var(--line);border-radius:var(--r);padding:12px;margin-bottom:12px;
        box-shadow:0 3px 0 var(--line);transition:transform .1s;}
  .habit.done{border-color:#cdeeb0;box-shadow:0 3px 0 #cdeeb0;background:#fbfff5;}
  .habit .emoji{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;
        justify-content:center;font-size:24px;flex:none;}
  .habit .body{flex:1;min-width:0;cursor:pointer;}
  .habit .name{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .habit .meta{font-size:12px;font-weight:700;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
  .habit .meta .s{color:var(--fire);}
  .check{width:46px;height:46px;border-radius:50%;flex:none;border:3px solid var(--line);
        background:#fff;display:flex;align-items:center;justify-content:center;
        font-size:22px;color:transparent;transition:.12s;box-shadow:0 3px 0 var(--line);}
  .check:active{transform:translateY(3px);box-shadow:none;}
  .check.on{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 3px 0 var(--green-dark);}
  .check.on:active{box-shadow:none;}
  .check.play{color:var(--green);}
  .check.timing{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 3px 0 var(--orange-dark);}
  .check.timing:active{box-shadow:none;}
  .check.paused{background:#fff;border-color:var(--orange);color:var(--orange);box-shadow:0 3px 0 var(--orange-dark);}
  .check.paused:active{box-shadow:none;}
  .cd{color:var(--orange);font-weight:800;}
  .metalink{color:var(--red);font-weight:800;}
  .dur-opt{padding:9px 14px;border-radius:12px;background:var(--soft);font-weight:800;font-size:14px;border:2px solid transparent;transition:.1s;}
  .dur-opt.sel{border-color:var(--blue);background:#e9f7ff;color:var(--blue-dark);}
  .pop{animation:pop .3s ease;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

  /* empty state */
  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty .e{font-size:52px;margin-bottom:12px;}
  .empty p{font-size:15px;font-weight:700;line-height:1.5;}

  /* ---------- Stats ---------- */
  .stat-row{display:flex;gap:10px;margin-bottom:16px;}
  .stat{flex:1;background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 10px;text-align:center;box-shadow:0 3px 0 var(--line);}
  .stat .v{font-size:22px;font-weight:900;line-height:1;}
  .stat .k{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:5px;}
  .section-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 2px 10px;}
  .week{display:flex;justify-content:space-between;gap:6px;background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 12px;box-shadow:0 3px 0 var(--line);}
  .week .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .week .bar-wrap{width:100%;height:64px;display:flex;align-items:flex-end;justify-content:center;}
  .week .bar{width:60%;max-width:22px;background:var(--green);border-radius:6px 6px 3px 3px;min-height:4px;transition:height .3s;}
  .week .bar.zero{background:var(--line);}
  .week .dlabel{font-size:10px;font-weight:800;color:var(--muted);}
  .week .dval{font-size:11px;font-weight:800;}

  .statcard{background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:0 3px 0 var(--line);}
  .statcard .head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .statcard .emoji{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
  .statcard .hname{font-weight:800;font-size:15px;flex:1;}
  .statcard .nums{display:flex;gap:16px;margin-bottom:12px;}
  .statcard .nums .b{font-size:11px;font-weight:800;color:var(--muted);}
  .statcard .nums .b span{display:block;font-size:18px;font-weight:900;color:var(--text);margin-top:2px;}
  .statcard .nums .b .fire{color:var(--fire);}
  .grid30{display:grid;grid-template-columns:repeat(15,1fr);gap:4px;}
  .grid30 .cell{aspect-ratio:1;border-radius:4px;background:var(--soft);}
  .grid30 .cell.future{background:transparent;}
  .grid30 .cell.miss{background:#ededed;}

  /* ---------- FAB ---------- */
  .fab{position:fixed;bottom:24px;right:calc(50% - 240px + 20px);width:60px;height:60px;border-radius:18px;
       background:var(--green);color:#fff;font-size:34px;font-weight:700;display:flex;align-items:center;justify-content:center;
       box-shadow:0 5px 0 var(--green-dark);z-index:30;line-height:1;padding-bottom:4px;}
  .fab:active{transform:translateY(5px);box-shadow:none;}
  @media(max-width:520px){.fab{right:20px;}}

  /* ---------- Sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40;opacity:0;pointer-events:none;transition:.2s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-radius:22px 22px 0 0;
        max-width:480px;margin:0 auto;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
        transform:translateY(110%);transition:transform .25s cubic-bezier(.2,.8,.2,1);max-height:90vh;overflow-y:auto;}
  .sheet.show{transform:translateY(0);}
  .sheet .grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 14px;}
  .sheet h2{font-size:18px;font-weight:900;margin:0 0 16px;}
  .field-label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px;}
  .name-input{width:100%;padding:14px;border:2px solid var(--line);border-radius:14px;font-size:16px;font-weight:700;outline:none;transition:.15s;}
  .name-input:focus{border-color:var(--blue);}
  .picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .emoji-opt{width:46px;height:46px;border-radius:12px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:23px;border:2px solid transparent;transition:.1s;}
  .emoji-opt.sel{border-color:var(--blue);background:#e9f7ff;}
  .color-opt{width:38px;height:38px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px var(--line);transition:.1s;}
  .color-opt.sel{box-shadow:0 0 0 3px var(--text);transform:scale(1.08);}
  .btn{width:100%;padding:15px;border-radius:15px;font-size:16px;font-weight:800;color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-dark);transition:.1s;text-transform:uppercase;letter-spacing:.5px;}
  .btn:active{transform:translateY(4px);box-shadow:none;}
  .btn:disabled{background:var(--line);box-shadow:0 4px 0 #d0d0d0;color:#fff;cursor:default;}
  .btn-del{width:100%;margin-top:10px;padding:13px;border-radius:14px;font-size:14px;font-weight:800;color:var(--red);background:#fff;border:2px solid var(--line);transition:.15s;text-transform:uppercase;letter-spacing:.4px;}
  .btn-del.arm{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 4px 0 var(--red-dark);}
  .btn-del.arm:active{transform:translateY(4px);box-shadow:none;}

  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

  /* install banner */
  .install{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--line);
        border-radius:14px;padding:11px 12px;margin-bottom:14px;box-shadow:0 3px 0 var(--line);}
  .install .ic{font-size:22px;flex:none;}
  .install .tx{flex:1;font-size:12.5px;font-weight:700;line-height:1.4;}
  .install .tx b{font-weight:900;}
  .install .go{background:var(--green);color:#fff;padding:9px 13px;border-radius:11px;font-weight:800;font-size:13px;box-shadow:0 3px 0 var(--green-dark);flex:none;}
  .install .go:active{transform:translateY(3px);box-shadow:none;}
  .install .x{font-size:22px;color:var(--muted);padding:2px 6px;flex:none;line-height:1;}

  /* starter suggestions */
  .starters{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .starter{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--line);
        border-radius:14px;padding:11px 12px;box-shadow:0 3px 0 var(--line);font-weight:800;text-align:left;transition:transform .1s;}
  .starter:active{transform:translateY(3px);box-shadow:none;}
  .starter .emoji{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:none;}
  .starter .stx{flex:1;font-size:15px;}
  .starter .add{color:var(--green-dark);font-size:24px;font-weight:700;}

  /* toast */
  .toast{position:fixed;left:50%;bottom:98px;transform:translateX(-50%) translateY(16px);
        background:#3c3c3c;color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;font-size:14px;
        box-shadow:0 8px 24px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  button:focus-visible,input:focus-visible,.starter:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
</style>
<style id="glass">
  /* ===== Liquid Glass × Duolingo ===== */
  :root{
    --glass:rgba(255,255,255,.20);
    --glass-strong:rgba(255,255,255,.46);
    --glass-edge:rgba(255,255,255,.55);
    --glass-line:rgba(255,255,255,.32);
    --glass-hi:inset 0 1px 0 rgba(255,255,255,.65);
    --glass-elev:0 10px 28px rgba(20,28,38,.10);
    --gloss:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,0) 50%);
    --blur:saturate(180%) blur(26px);
  }
  body{background:#e4ebe6;}
  .app{
    background:
      radial-gradient(720px 460px at 10% -8%, rgba(88,204,2,.22), transparent 60%),
      radial-gradient(660px 460px at 116% 4%, rgba(28,176,246,.16), transparent 58%),
      radial-gradient(680px 520px at -10% 60%, rgba(0,205,156,.14), transparent 60%),
      radial-gradient(720px 540px at 60% 118%, rgba(206,130,255,.14), transparent 60%),
      linear-gradient(180deg,#eef4ef,#e6ede8);
    background-attachment:fixed;
  }

  /* clean Apple-style material */
  header{
    background:rgba(255,255,255,.16);
    -webkit-backdrop-filter:saturate(180%) blur(30px);
    backdrop-filter:saturate(180%) blur(30px);
    border-bottom:1px solid var(--glass-line);
    box-shadow:var(--glass-hi);
  }
  .tabs{
    background:rgba(255,255,255,.10);
    -webkit-backdrop-filter:saturate(180%) blur(30px);
    backdrop-filter:saturate(180%) blur(30px);
  }
  .tab{background:rgba(255,255,255,.28);border:1px solid var(--glass-line);}
  .tab.active{
    background:linear-gradient(180deg,rgba(234,250,219,.9),rgba(215,245,184,.68));
    border-color:rgba(120,200,40,.45);box-shadow:var(--glass-hi);
  }

  .flamebox{
    background:linear-gradient(180deg,rgba(255,244,229,.55),rgba(255,236,210,.32));
    border-color:rgba(255,200,140,.6);box-shadow:var(--glass-hi);
  }

  .habit, .statcard, .week, .stat, .install, .starter{
    background:var(--glass);
    -webkit-backdrop-filter:var(--blur);
    backdrop-filter:var(--blur);
    border:1px solid var(--glass-edge);
    box-shadow:var(--glass-hi),var(--glass-elev);
    border-radius:22px;
  }
  .habit.done{
    background:rgba(213,243,180,.34);
    border-color:rgba(120,200,40,.42);
  }
  .alldone{
    background:rgba(213,243,180,.42);
    border-color:rgba(120,200,40,.45);box-shadow:var(--glass-hi);
  }
  .habit .emoji,.statcard .emoji,.starter .emoji{box-shadow:inset 0 1px 0 rgba(255,255,255,.6);}

  /* signature Duolingo buttons */
  .check.on{background-color:var(--green);background-image:var(--gloss);}
  .check.timing{background-color:var(--orange);background-image:var(--gloss);}
  .btn{background-image:var(--gloss);}
  .fab{
    background-color:var(--green);background-image:var(--gloss);
    box-shadow:0 5px 0 var(--green-dark),0 12px 26px rgba(70,163,0,.34),var(--glass-hi);
  }
  .check{box-shadow:0 3px 0 var(--line),var(--glass-hi);}
  .check.on{box-shadow:0 3px 0 var(--green-dark),var(--glass-hi);}
  .check.timing{box-shadow:0 3px 0 var(--orange-dark),var(--glass-hi);}

  /* clean glass sheet + overlays */
  .sheet{
    background:rgba(255,255,255,.42);
    -webkit-backdrop-filter:saturate(180%) blur(40px);
    backdrop-filter:saturate(180%) blur(40px);
    border-top:1px solid var(--glass-line);
    box-shadow:var(--glass-hi),0 -8px 40px rgba(20,28,38,.14);
  }
  .scrim{background:rgba(15,20,28,.30);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
  .name-input{background:rgba(255,255,255,.45);}
  .emoji-opt,.dur-opt,.color-opt{box-shadow:0 0 0 1px rgba(255,255,255,.4) inset;}
  .toast{
    background:rgba(26,30,28,.6);
    -webkit-backdrop-filter:blur(20px) saturate(1.5);
    backdrop-filter:blur(20px) saturate(1.5);
    box-shadow:var(--glass-hi),0 12px 34px rgba(0,0,0,.32);
  }

  /* graceful fallback where blur/transparency isn't available */
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    header,.tabs{background:rgba(255,255,255,.96);}
    .habit,.statcard,.week,.stat,.install,.starter{background:rgba(255,255,255,.96);}
    .sheet{background:rgba(255,255,255,.98);}
    .toast{background:#2a2e2c;}
  }
  @media(prefers-reduced-transparency:reduce){
    header,.tabs{background:#fff;}
    .habit,.statcard,.week,.stat,.install,.starter{background:#fff;}
    .sheet{background:#fff;}
    .toast{background:#2a2e2c;}
    .app{background:linear-gradient(180deg,#f4f8f2,#eef4f0);}
  }

  /* ===== celebration FX ===== */
  #fx{position:fixed;inset:0;pointer-events:none;z-index:45;}
  .fx-ring{position:fixed;width:22px;height:22px;border-radius:50%;
    border:3px solid var(--green);transform:translate(-50%,-50%) scale(.4);
    opacity:.9;pointer-events:none;z-index:46;animation:fxring .55s ease-out forwards;}
  @keyframes fxring{to{transform:translate(-50%,-50%) scale(5.2);opacity:0;}}

  .ms-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;z-index:65;opacity:0;transition:opacity .25s;background:rgba(20,30,24,.18);}
  .ms-overlay.show{opacity:1;}
  .ms-card{background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:blur(30px) saturate(1.7);backdrop-filter:blur(30px) saturate(1.7);
    border:1px solid var(--glass-edge);border-radius:28px;padding:26px 36px;text-align:center;
    box-shadow:var(--glass-hi),0 22px 60px rgba(33,46,40,.28);transform:scale(.6);opacity:0;}
  .ms-overlay.show .ms-card{animation:mspop .55s cubic-bezier(.2,1.3,.35,1) forwards;}
  @keyframes mspop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.06);opacity:1}100%{transform:scale(1);opacity:1}}
  .ms-flame{display:flex;align-items:center;justify-content:center;}
  .ms-num{font-size:48px;font-weight:900;color:var(--fire);line-height:1;margin-top:6px;}
  .ms-lbl{font-size:14px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--text);margin-top:4px;}

  /* ===== mascot "Ember" ===== */
  .mascot{display:inline-block;width:52px;height:62px;flex:none;}
  .m-svg{width:100%;height:100%;display:block;overflow:visible;}
  .m-bob{transform-box:fill-box;transform-origin:50% 100%;}
  .m-wisp{transform-box:fill-box;transform-origin:50% 100%;}
  .m-arm{transform-box:fill-box;transform-origin:50% 14%;transition:transform .28s cubic-bezier(.2,1.6,.4,1);}
  .m-eyes-happy,.m-eyes-closed,.m-mouth-grin,.m-mouth-flat,.m-spark{display:none;}
  .mascot.mood-neutral .m-mouth-smile{display:none;}
  .mascot.mood-neutral .m-mouth-flat{display:block;}
  .mascot.mood-neutral .m-body,.mascot.mood-neutral .m-wisp,.mascot.mood-neutral .m-arm,.mascot.mood-neutral .m-foot{filter:saturate(.72) brightness(.97);}
  .mascot.mood-happy .m-eyes-open{display:none;}
  .mascot.mood-happy .m-eyes-happy{display:block;}
  .mascot.mood-happy .m-mouth-smile{display:none;}
  .mascot.mood-happy .m-mouth-grin{display:block;}
  .mascot.blink .m-eyes-open{display:none;}
  .mascot.blink .m-eyes-closed{display:block;}
  .mascot.celebrate .m-eyes-open{display:none;}
  .mascot.celebrate .m-eyes-happy{display:block;}

  @media(prefers-reduced-motion:no-preference){
    .m-bob{animation:mbreathe 3.2s ease-in-out infinite;}
    .m-wisp{animation:mwisp 2.3s ease-in-out infinite;}

  }
  @keyframes mbreathe{0%,100%{transform:translateY(0) scale(1,1)}50%{transform:translateY(-1.5px) scale(1.03,.975)}}
  @keyframes mwisp{0%,100%{transform:rotate(-8deg) scaleY(1)}50%{transform:rotate(8deg) scaleY(1.12)}}

  @keyframes mspark{0%{opacity:0;transform:scale(.3)}40%{opacity:1;transform:scale(1.05)}100%{opacity:0;transform:scale(1.25)}}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const KEY='habitTracker_v1';
const EMOJIS=['💧','🏃','📚','🧘','🍎','😴','💪','🚴','🎸','✍️','🧹','💊','🎯','🌱','☕','🦷','🧠','🥗','🧴','🎨'];
const COLORS=['green','blue','purple','orange','red','yellow','teal','pink'];
const DURATIONS=[0,1,5,10,15,20,30];
const STARTERS=[
  {name:'Wasser trinken',emoji:'💧',color:'blue',duration:0},
  {name:'Bewegung',emoji:'🏃',color:'green',duration:0},
  {name:'10 Min dehnen',emoji:'🧘',color:'purple',duration:10},
  {name:'Lesen',emoji:'📚',color:'orange',duration:15},
];

let state={habits:[]};
let tab='today';
let editId=null, selEmoji=EMOJIS[0], selColor=COLORS[0], selDuration=0, delArmed=false;
let ticker=null;

/* ---- storage ---- */
function load(){try{state=JSON.parse(localStorage.getItem(KEY))||{habits:[]}}catch(e){state={habits:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));scheduleSync();}

/* ---- dates ---- */
function pad(n){return String(n).padStart(2,'0')}
function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
let TODAY=ymd(new Date());

/* ---- streak logic ---- */
function currentStreak(h){
  let s=0,d=new Date();
  if(!h.history[ymd(d)])d=addDays(d,-1);
  while(h.history[ymd(d)]){s++;d=addDays(d,-1);}
  return s;
}
function bestStreak(h){
  const days=Object.keys(h.history).filter(k=>h.history[k]).sort();
  let best=0,run=0,prev=null;
  for(const k of days){
    if(prev&&ymd(addDays(parseKey(prev),1))===k)run++;else run=1;
    if(run>best)best=run;prev=k;
  }
  return best;
}
function completionRate(h){
  const start=parseKey(h.createdAt);
  const total=Math.max(1,Math.round((parseKey(TODAY)-start)/86400000)+1);
  const done=Object.values(h.history).filter(Boolean).length;
  return Math.round(done/total*100);
}

/* ---- render ---- */
function render(){
  const done=state.habits.filter(h=>h.history[TODAY]).length;
  const tot=state.habits.length;
  document.getElementById('ringNum').textContent=done+'/'+tot;
  const pct=tot?done/tot:0;
  document.getElementById('ringProg').style.strokeDashoffset=169.6*(1-pct);
  const top=state.habits.reduce((m,h)=>Math.max(m,currentStreak(h)),0);
  document.getElementById('topStreak').textContent=top;
  renderToday(done,tot);
  renderStats();
  updateMascotMood(done,tot);
}

function streakMeta(h){
  const st=currentStreak(h);
  return st>0?`<span class="s">🔥 ${st} ${st===1?'Tag':'Tage'} Serie</span>`:'noch keine Serie';
}
function mmss(ms){const s=Math.max(0,Math.round(ms/1000));return Math.floor(s/60)+':'+pad(s%60);}

function renderToday(done,tot){
  const v=document.getElementById('todayView');
  let html='';
  const hasShared=sbUser&&sbShared.length;
  if(hasShared){
    html+='<div class="shared-head">💜 Gemeinsam</div>';
    sbShared.forEach(h=>html+=sharedCard(h));
  }
  if(!tot){
    if(!hasShared){
      html+=`<div class="empty" style="padding:34px 12px 14px"><div class="e">🌱</div>
        <p>Leg los mit deinem ersten Habit.<br>Tippe unten auf <b>+</b> oder wähle einen Vorschlag:</p></div>
        <div class="starters">${STARTERS.map((s,i)=>`
          <button class="starter" onclick="addStarter(${i})">
            <span class="emoji" style="background:var(--${s.color}-tint);color:var(--${s.color})">${s.emoji}</span>
            <span class="stx">${s.name}${s.duration?` · ⏱ ${s.duration} Min`:''}</span>
            <span class="add">＋</span>
          </button>`).join('')}</div>`;
    }
    v.innerHTML=html;return;
  }
  if(hasShared)html+='<div class="shared-head" style="margin-top:18px">Meine Habits</div>';
  if(done===tot&&tot>0)html+='<div class="alldone">🎉 Alles erledigt für heute. Stark!</div>';
  state.habits.forEach(h=>{
    const on=!!h.history[TODAY];
    const timed=h.duration>0;
    const running=h.timer&&h.timer.endsAt;
    const paused=h.timer&&h.timer.remaining!=null;
    let btn,meta;
    const cancel=`<span class="metalink" onclick="event.stopPropagation();cancelTimer('${h.id}')">Abbrechen</span>`;
    if(on){
      btn=`<button class="check on" data-h="${h.id}" onclick="toggle('${h.id}',this)">✓</button>`;
      meta=streakMeta(h)+(timed?` · ⏱ ${h.duration} Min`:'');
    }else if(running){
      const rem=h.timer.endsAt-Date.now();
      btn=`<button id="cb-${h.id}" class="check timing" onclick="pauseTimer('${h.id}')">⏸</button>`;
      meta=`<span class="cd" id="cd-${h.id}">⏱ ${mmss(rem)}</span> läuft · ${cancel}`;
    }else if(paused){
      btn=`<button id="cb-${h.id}" class="check paused" onclick="resumeTimer('${h.id}')">▶</button>`;
      meta=`<span class="cd" id="cd-${h.id}">⏱ ${mmss(h.timer.remaining)}</span> pausiert · ${cancel}`;
    }else if(timed){
      btn=`<button class="check play" onclick="startTimer('${h.id}')">▶</button>`;
      meta=streakMeta(h)+` · ⏱ ${h.duration} Min`;
    }else{
      btn=`<button class="check" data-h="${h.id}" onclick="toggle('${h.id}',this)">✓</button>`;
      meta=streakMeta(h);
    }
    html+=`<div class="habit ${on?'done':''}">
      <div class="emoji" style="background:var(--${h.color}-tint,#eee);color:var(--${h.color})"
           onclick="openSheet('${h.id}')">${h.emoji}</div>
      <div class="body" onclick="openSheet('${h.id}')">
        <div class="name">${esc(h.name)}</div>
        <div class="meta">${meta}</div>
      </div>
      ${btn}
    </div>`;
  });
  v.innerHTML=html;
}

function renderStats(){
  const v=document.getElementById('statsView');
  if(!state.habits.length){v.innerHTML='<div class="empty"><div class="e">📊</div><p>Statistiken erscheinen,<br>sobald du Habits hast.</p></div>';return;}
  const done=state.habits.filter(h=>h.history[TODAY]).length;
  const best=state.habits.reduce((m,h)=>Math.max(m,bestStreak(h)),0);
  let html=`<div class="stat-row">
    <div class="stat"><div class="v">${state.habits.length}</div><div class="k">Habits</div></div>
    <div class="stat"><div class="v">${done}/${state.habits.length}</div><div class="k">heute</div></div>
    <div class="stat"><div class="v" style="color:var(--fire)">${best}</div><div class="k">Rekord</div></div>
  </div>`;

  // last 7 days bar
  const dayNames=['So','Mo','Di','Mi','Do','Fr','Sa'];
  let counts=[],maxc=1;
  for(let i=6;i>=0;i--){
    const d=addDays(new Date(),-i),k=ymd(d);
    const c=state.habits.filter(h=>h.history[k]).length;
    counts.push({k,c,d});if(c>maxc)maxc=c;
  }
  html+='<div class="section-title">Letzte 7 Tage</div><div class="week">';
  counts.forEach(o=>{
    const hpx=Math.round(o.c/maxc*64);
    html+=`<div class="day">
      <div class="dval">${o.c||''}</div>
      <div class="bar-wrap"><div class="bar ${o.c?'':'zero'}" style="height:${o.c?Math.max(hpx,6):4}px"></div></div>
      <div class="dlabel">${dayNames[o.d.getDay()]}</div></div>`;
  });
  html+='</div>';

  // per habit
  html+='<div class="section-title">Pro Habit</div>';
  state.habits.forEach(h=>{
    html+=`<div class="statcard">
      <div class="head">
        <div class="emoji" style="background:var(--${h.color}-tint,#eee);color:var(--${h.color})">${h.emoji}</div>
        <div class="hname">${esc(h.name)}</div>
      </div>
      <div class="nums">
        <div class="b">Aktuelle Serie<span class="fire">🔥 ${currentStreak(h)}</span></div>
        <div class="b">Rekord<span>${bestStreak(h)}</span></div>
        <div class="b">Erfüllt<span>${completionRate(h)}%</span></div>
      </div>
      <div class="grid30">${grid30(h)}</div>
    </div>`;
  });

  html+=`<div class="section-title">Sound</div>
    <div class="statcard">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:22px">${soundOn?'🔊':'🔇'}</span>
        <span style="flex:1;font-weight:800;font-size:14px">Soundeffekte</span>
        <button class="toggle ${soundOn?'on':''}" onclick="setSound(${!soundOn})" aria-label="Sound umschalten"><span class="knob"></span></button>
      </div>
      <button class="btn-del" style="margin-top:12px" onclick="testSound()">Sound testen</button>
    </div>`;

  html+=`<div class="section-title">Design</div><div class="themes">`+

function grid30(h){
  let cells='';
  for(let i=29;i>=0;i--){
    const k=ymd(addDays(new Date(),-i));
    const on=!!h.history[k];
    const created=k>=h.createdAt;
    if(!created){cells+='<div class="cell miss"></div>';}
    else if(on){cells+=`<div class="cell" style="background:var(--${h.color})"></div>`;}
    else{cells+='<div class="cell miss"></div>';}
  }
  return cells;
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function toggle(id,btn){
  const h=state.habits.find(x=>x.id===id);if(!h)return;
  const marking=!h.history[TODAY];
  if(h.history[TODAY])delete h.history[TODAY];else h.history[TODAY]=true;
  h.timer=null;
  save();render();
  if(marking){
    const s=currentStreak(h);
    const nb=document.querySelector('.check[data-h="'+id+'"]')||btn;
    const big=MILESTONES.includes(s);
    ensureAudio();
    sndCheck();
    celebrateAt(nb,big);
    if(big){milestoneBanner(s);emberRain();sndMilestone();}
    else{toast(s>0?('🔥 '+s+' '+(s===1?'Tag':'Tage')+' Serie'):'Erledigt');if(s>0)sndStreak(s);}
  }
}

function startTimer(id){
  const h=state.habits.find(x=>x.id===id);if(!h)return;
  ensureAudio();
  h.timer={endsAt:Date.now()+h.duration*60000};
  save();render();ensureTicker();
  toast('Timer läuft · '+h.duration+' Min');
}
function pauseTimer(id){
  const h=state.habits.find(x=>x.id===id);if(!h||!h.timer||!h.timer.endsAt)return;
  h.timer={remaining:Math.max(0,h.timer.endsAt-Date.now())};
  save();render();ensureTicker();
}
function resumeTimer(id){
  const h=state.habits.find(x=>x.id===id);if(!h||!h.timer||h.timer.remaining==null)return;
  h.timer={endsAt:Date.now()+h.timer.remaining};
  save();render();ensureTicker();
}
function cancelTimer(id){
  const h=state.habits.find(x=>x.id===id);if(!h)return;
  h.timer=null;save();render();ensureTicker();
}
function ensureTicker(){
  const anyRunning=state.habits.some(h=>h.timer&&h.timer.endsAt);
  if(anyRunning&&!ticker)ticker=setInterval(tick,1000);
  else if(!anyRunning&&ticker){clearInterval(ticker);ticker=null;}
}
function tick(){
  let doneId=null,doneName=null;
  state.habits.forEach(h=>{
    if(h.timer&&h.timer.endsAt){
      const rem=h.timer.endsAt-Date.now();
      if(rem<=0){h.history[TODAY]=true;h.timer=null;doneId=h.id;doneName=h.name;}
      else{const el=document.getElementById('cd-'+h.id);if(el)el.textContent='⏱ '+mmss(rem);}
    }
  });
  if(doneId){
    save();render();ensureTicker();
    const h=state.habits.find(x=>x.id===doneId);
    const s=h?currentStreak(h):0;
    const nb=document.querySelector('.check[data-h="'+doneId+'"]');
    const big=MILESTONES.includes(s);
    toast('🔥 '+doneName+' geschafft!');
    sndCheck();
    celebrateAt(nb,big);
    if(big){milestoneBanner(s);emberRain();sndMilestone();}
    else if(s>0)sndStreak(s);
  }
}
function reconcileTimers(){
  let changed=false;
  state.habits.forEach(h=>{
    if(h.timer&&h.timer.endsAt&&Date.now()>=h.timer.endsAt){
      if(!h.history[TODAY])h.history[TODAY]=true;
      h.timer=null;changed=true;
    }
  });
  if(changed)save();
}

function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data||!Array.isArray(data.habits))throw 0;
      data.habits.forEach(h=>{if(!h.history)h.history={};if(h.duration==null)h.duration=0;if(!('timer'in h))h.timer=null;});
      state=data;save();render();ensureTicker();toast('Backup geladen');
    }catch(err){toast('Datei konnte nicht gelesen werden');}
    importArmed=false;e.target.value='';
  };
  r.readAsText(f);
}

let audioCtx=null,master=null,comp=null,reverb=null,revGain=null,soundOn=true;
function loadSound(){try{soundOn=localStorage.getItem('streak_sound')!=='off'}catch(e){soundOn=true}}

function unlockAudio(){
  ensureAudio();
  try{
    if(audioCtx){
      const b=audioCtx.createBuffer(1,1,22050);
      const s=audioCtx.createBufferSource();s.buffer=b;s.connect(master||audioCtx.destination);s.start(0);
    }
  }catch(e){}
}
window.addEventListener('pointerdown',unlockAudio,{once:true});
window.addEventListener('touchend',unlockAudio,{once:true});
function ensureAudio(){
  try{if(navigator.audioSession){navigator.audioSession.type='playback';}}catch(e){}
  try{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      comp=audioCtx.createDynamicsCompressor();
      comp.threshold.value=-16;comp.knee.value=26;comp.ratio.value=3;comp.attack.value=0.003;comp.release.value=0.2;
      master=audioCtx.createGain();master.gain.value=0.85;
      master.connect(comp);comp.connect(audioCtx.destination);
      reverb=audioCtx.createConvolver();reverb.buffer=makeIR(1.5,2.4);
      revGain=audioCtx.createGain();revGain.gain.value=0.85;
      revGain.connect(reverb);reverb.connect(master);
    }
    if(audioCtx.state==='suspended')audioCtx.resume();
  }catch(e){}
}
function makeIR(dur,decay){
  const rate=audioCtx.sampleRate,len=Math.floor(rate*dur);
  const buf=audioCtx.createBuffer(2,len,rate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}
const PARTIALS={
  marimba:[[1,1],[2,0.4],[3,0.18],[4,0.06]],
  bell:[[1,1],[2,0.5],[3.01,0.32],[4.7,0.18],[6.2,0.1]]
};
function voice(freq,start,dur,o){
  if(!audioCtx)return;o=o||{};
  const t=audioCtx.currentTime+start;
  const peak=o.gain||0.3,send=o.send==null?0.3:o.send,bright=o.bright||3200;
  const parts=PARTIALS[o.tone||'marimba'];
  const env=audioCtx.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(peak,t+0.004);
  env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=bright;
  parts.forEach(([mult,amp])=>{
    const osc=audioCtx.createOscillator();osc.type='sine';osc.frequency.value=freq*mult;
    const g=audioCtx.createGain();g.gain.value=amp;
    osc.connect(g);g.connect(env);osc.start(t);osc.stop(t+dur+0.06);
  });
  env.connect(lp);lp.connect(master);
  const s=audioCtx.createGain();s.gain.value=send;lp.connect(s);s.connect(revGain);
}
function padTone(freq,start,dur,gain){
  if(!audioCtx)return;
  const t=audioCtx.currentTime+start;
  const o=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o2.type='sine';o.frequency.value=freq;o2.frequency.value=freq*2.002;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain,t+0.06);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);o2.connect(g);g.connect(master);g.connect(revGain);
  o.start(t);o2.start(t);o.stop(t+dur+0.05);o2.stop(t+dur+0.05);
}
function pop(){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(430,t);o.frequency.exponentialRampToValueAtTime(120,t+0.07);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.5,t+0.005);g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+0.15);
  const n=Math.floor(audioCtx.sampleRate*0.025);
  const buf=audioCtx.createBuffer(1,n,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1900;bp.Q.value=0.8;
  const ng=audioCtx.createGain();ng.gain.setValueAtTime(0.18,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
  src.connect(bp);bp.connect(ng);ng.connect(master);src.start(t);src.stop(t+0.05);
}
function sndCheck(){
  if(!soundOn)return;ensureAudio();if(!audioCtx)return;
  pop();
}
function sndStreak(level){
  if(!soundOn)return;ensureAudio();if(!audioCtx)return;
  const seq=[523.25,659.25,783.99];                 // C E G (major)
  const lift=Math.pow(2,Math.min(Math.max((level||1)-1,0),4)/12); // climbs by semitones
  seq.forEach((f,i)=>voice(f*lift,i*0.08,0.55,{gain:0.32,send:0.35}));
  voice(1046.5*lift,0.24,0.8,{gain:0.16,send:0.5,tone:'bell'}); // sparkle top
}
function sndMilestone(){
  if(!soundOn)return;ensureAudio();if(!audioCtx)return;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>voice(f,i*0.1,0.6,{gain:0.3,send:0.35})); // C E G C run
  voice(1318.5,0.46,1.2,{gain:0.2,send:0.55,tone:'bell'});      // triumphant bell
  voice(1567.98,0.6,0.9,{gain:0.12,send:0.55,tone:'bell'});     // sparkle
  [261.63,329.63,392].forEach(f=>padTone(f,0.46,1.0,0.05));         // warm chord
}
/* ---- celebration effects ---- */
const MILESTONES=[3,7,14,30,50,75,100,150,200,365];
const FX_COLORS=['#58cc02','#ff9600','#ffc800','#7ee03c','#ffffff'];
let fxCanvas,fxCtx,fxParticles=[],fxRAF=null;
function reduceMotion(){return window.matchMedia('(prefers-reduced-motion:reduce)').matches;}
function fxInit(){
  fxCanvas=document.getElementById('fx');if(!fxCanvas)return;
  fxCtx=fxCanvas.getContext('2d');fxResize();
  window.addEventListener('resize',fxResize);
}
function fxResize(){
  if(!fxCanvas)return;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  fxCanvas.width=innerWidth*dpr;fxCanvas.height=innerHeight*dpr;
  fxCanvas.style.width=innerWidth+'px';fxCanvas.style.height=innerHeight+'px';
  fxCtx.setTransform(dpr,0,0,dpr,0,0);
}
function fxStart(){if(!fxRAF)fxRAF=requestAnimationFrame(fxTick);}
function fxTick(){
  fxCtx.clearRect(0,0,innerWidth,innerHeight);
  fxCtx.globalCompositeOperation='lighter';
  for(let i=fxParticles.length-1;i>=0;i--){
    const p=fxParticles[i];
    p.vy+=p.g;p.vx*=0.99;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0||p.y>innerHeight+20){fxParticles.splice(i,1);continue;}
    fxCtx.globalAlpha=Math.max(p.life,0);
    fxCtx.beginPath();
    fxCtx.arc(p.x,p.y,p.r*(0.5+p.life*0.5),0,6.283);
    fxCtx.fillStyle=p.color;fxCtx.fill();
  }
  fxCtx.globalAlpha=1;fxCtx.globalCompositeOperation='source-over';
  if(fxParticles.length)fxRAF=requestAnimationFrame(fxTick);
  else{fxRAF=null;fxCtx.clearRect(0,0,innerWidth,innerHeight);}
}
function spawnBurst(x,y,n,power){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.283,sp=(Math.random()*0.6+0.4)*power;
    fxParticles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-power*0.35,
      r:Math.random()*3+2,life:1,decay:Math.random()*0.012+0.013,
      color:FX_COLORS[(Math.random()*FX_COLORS.length)|0],g:0.07});
  }
  fxStart();
}
function emberRain(){
  if(reduceMotion()||!fxCtx)return;
  for(let i=0;i<46;i++){
    setTimeout(()=>{
      fxParticles.push({x:Math.random()*innerWidth,y:-10,
        vx:(Math.random()-0.5)*1.2,vy:Math.random()*1.6+1.1,

let deferredPrompt=null, installDismissed=false;

  return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;

  const host=document.getElementById('installHost');if(!host)return;
  if(isStandalone()||installDismissed){host.innerHTML='';return;}
  const ios=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
  const action=deferredPrompt?`<button class="go" onclick="doInstall()">Installieren</button>`:'';
  const tx=ios
    ? `<div class="tx"><b>Als App installieren:</b> Teilen-Symbol antippen ➜ „Zum Home-Bildschirm".</div>`
    : `<div class="tx"><b>Als App installieren</b> – Vollbild und offline nutzbar.</div>`;

    <button class="x" aria-label="Hinweis schließen" onclick="dismissInstall()">×</button></div>`;

function doInstall(){

function sharedDayComplete(h,day){
  const set={};(h.checkins||[]).forEach(c=>set[c.user_id+'|'+c.day]=true);
  const mem=h.members||[];
  return mem.length>0 && mem.every(m=>set[m.user_id+'|'+day]);
}
function sharedStreak(h){
  let s=0,d=new Date();
  if(!sharedDayComplete(h,ymd(d)))d=addDays(d,-1);
  while(sharedDayComplete(h,ymd(d))){s++;d=addDays(d,-1);}
  return s;
}
function myShared(h){return (h.checkins||[]).some(c=>c.user_id===sbUser.id&&c.day===TODAY);}
async function toggleShared(id){
  const h=sbShared.find(x=>x.id===id);if(!h||!sbUser)return;
  const mine=myShared(h);
  if(mine)h.checkins=h.checkins.filter(c=>!(c.user_id===sbUser.id&&c.day===TODAY));
  else h.checkins.push({user_id:sbUser.id,day:TODAY});
  const complete=sharedDayComplete(h,TODAY);
  ensureAudio();render();
  if(!mine){
    sndCheck();
    const fr=(h.members||[]).find(m=>m.user_id!==sbUser.id);
    if(complete)showHug(sharedStreak(h),fr?(fr.name||'Freund'):'Freund');
    else toast('Erledigt – warten auf '+(fr?(fr.name||'Freund'):'Freund')+' 💜');
  }
  try{await sb.rpc('set_shared_checkin',{p_habit:id,p_day:TODAY,p_done:!mine});}catch(e){toast('Sync-Fehler');}
  await sbLoadShared();render();
}

function sharedCard(h){
  const mine=myShared(h);
  const fr=(h.members||[]).find(m=>m.user_id!==sbUser.id);
  const fname=fr?(fr.name||'Freund'):'Freund';
  const fdone=fr?(h.checkins||[]).some(c=>c.user_id===fr.user_id&&c.day===TODAY):false;

    <button class="check ${mine?'on cpurple':''}" onclick="toggleShared('${h.id}')">✓</button>
  </div>`;
}
function mergeStates(a,b){
  const map={};
  const add=h=>{
    if(!h||!h.id)return;
    if(!map[h.id]){map[h.id]={...h,history:{...(h.history||{})}};}
    else{
      const c=map[h.id];const hist=h.history||{};
      for(const k in hist)if(hist[k])c.history[k]=true;
      if(h.createdAt&&(!c.createdAt||h.createdAt<c.createdAt))c.createdAt=h.createdAt;
    }
  };
  (a&&a.habits||[]).forEach(add);
  (b&&b.habits||[]).forEach(add);
  return {habits:Object.values(map)};
}
async function pullCloud(merge){
  if(!sb||!sbUser||syncing)return;
  syncing=true;
  try{
    const {data,error}=await sb.from('app_state').select('state').eq('user_id',sbUser.id).maybeSingle();
    if(!error&&data&&data.state&&Array.isArray(data.state.habits)){
      state=merge?mergeStates(state,data.state):data.state;
      localStorage.setItem(KEY,JSON.stringify(state));
      reconcileTimers();render();ensureTicker();
    }
  }catch(e){}
  syncing=false;
  pushCloud();
}
function scheduleSync(){
  if(!sb||!sbUser)return;
  clearTimeout(syncT);syncT=setTimeout(pushCloud,1500);
}
async function pushCloud(){
  if(!sb||!sbUser)return;
  try{await sb.from('app_state').upsert({user_id:sbUser.id,state:state,updated_at:new Date().toISOString()});}catch(e){}
}
