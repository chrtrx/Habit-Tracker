<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Urlaubsplaner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sky: #0ea5e9;
      --sky-d: #0284c7;
      --sky-l: #e0f2fe;
      --amber: #f59e0b;
      --amber-l: #fef3c7;
      --green: #10b981;
      --green-l: #d1fae5;
      --rose: #f43f5e;
      --rose-l: #ffe4e6;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-2: #6b7280;
      --text-3: #9ca3af;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
      --tab-h: 62px;
      --safe: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; -webkit-tap-highlight-color: transparent; }

    #app { display: flex; flex-direction: column; min-height: 100%; max-width: 480px; margin: 0 auto; }
    #content { flex: 1; padding: 16px 16px calc(var(--tab-h) + var(--safe) + 20px); overflow-x: hidden; }

    nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: calc(var(--tab-h) + var(--safe)); background: rgba(255,255,255,.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: var(--safe); }
    nav button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border: none; background: none; cursor: pointer; padding: 8px 4px; font-size: 10.5px; color: var(--text-3); font-weight: 500; transition: color .2s; }
    nav button .ni { font-size: 23px; line-height: 1; }
    nav button.active { color: var(--sky); }

    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; }
    .card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 600; padding: 11px 18px; transition: filter .15s; font-family: inherit; }
    .btn:active { filter: brightness(.9); }
    .btn-primary { background: var(--sky); color: #fff; }
    .btn-ghost { background: transparent; color: var(--sky); border: 1.5px solid var(--sky); }
    .btn-sm { padding: 7px 13px; font-size: 13px; border-radius: 8px; }
    .btn-danger { background: var(--rose-l); color: var(--rose); border: none; }
    .btn-full { width: 100%; margin-top: 8px; }

    input[type=text], input[type=number], input[type=date], select, textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border-color .15s; font-family: inherit; appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--sky); }
    textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .frow { margin-bottom: 12px; }
    .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .pbar-wrap { background: var(--border); border-radius: 8px; height: 7px; overflow: hidden; }
    .pbar { height: 100%; border-radius: 8px; transition: width .6s ease; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 3px; background: var(--sky-l); border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 500; color: var(--sky-d); }
    .chip .x { cursor: pointer; color: var(--text-3); margin-left: 1px; line-height: 1; }

    .empty { text-align: center; padding: 44px 20px; color: var(--text-2); }
    .empty .ei { font-size: 52px; margin-bottom: 14px; }
    .empty .et { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-inner { padding: 20px 20px calc(20px + var(--safe)); }
    .sheet-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .close-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); }

    /* ── REISE ── */
    .cd-box { background: linear-gradient(145deg, #e0f2fe 0%, #f0f9ff 60%, #fef3c7 100%); border-radius: var(--radius); padding: 32px 20px 28px; text-align: center; margin-bottom: 12px; position: relative; overflow: hidden; }
    .cd-box::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: rgba(14,165,233,.08); border-radius: 50%; }
    .cd-num { font-size: 88px; font-weight: 900; color: var(--sky); line-height: 1; letter-spacing: -3px; }
    .cd-label { font-size: 17px; font-weight: 700; color: var(--sky-d); margin-top: 4px; }
    .cd-sub { font-size: 13px; color: var(--text-2); margin-top: 6px; }
    .trip-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .trip-row:last-child { border-bottom: none; }
    .trip-row .ri { font-size: 20px; width: 26px; text-align: center; flex-shrink: 0; }
    .trip-row .rv { font-weight: 600; font-size: 14px; }
    .trip-row .rl { font-size: 12px; color: var(--text-2); margin-top: 1px; }

    /* ── PACKLISTE ── */
    .pack-stat { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .pack-stat .nums { font-size: 13px; color: var(--text-2); white-space: nowrap; font-weight: 500; }
    .cat-hd { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; padding: 10px 0 6px; display: flex; align-items: center; gap: 6px; }
    .pack-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 6px; box-shadow: var(--shadow); cursor: pointer; transition: background .15s; }
    .pack-item.done { background: var(--green-l); }
    .pi-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; transition: all .2s; }
    .pack-item.done .pi-check { background: var(--green); border-color: var(--green); color: #fff; }
    .pi-name { flex: 1; font-size: 14px; }
    .pack-item.done .pi-name { text-decoration: line-through; color: var(--text-2); }
    .pi-qty { font-size: 12px; color: var(--text-3); background: var(--border); padding: 2px 7px; border-radius: 10px; }
    .pi-del { color: var(--text-3); font-size: 15px; padding: 3px 4px; cursor: pointer; }

    /* ── KOSTEN ── */
    .cost-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .cs-box { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; box-shadow: var(--shadow); }
    .cs-num { font-size: 17px; font-weight: 800; color: var(--sky); line-height: 1.2; }
    .cs-lbl { font-size: 11px; color: var(--text-2); margin-top: 2px; }
    .exp-item { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; box-shadow: var(--shadow); }
    .exp-ava { width: 38px; height: 38px; border-radius: 50%; background: var(--sky-l); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .exp-info { flex: 1; min-width: 0; }
    .exp-desc { font-weight: 600; font-size: 14px; }
    .exp-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .exp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .exp-amt { font-weight: 700; font-size: 15px; }
    .exp-del { font-size: 14px; cursor: pointer; color: var(--text-3); }
    .settle-card { border-radius: var(--radius-sm); padding: 10px 12px; background: var(--surface); box-shadow: var(--shadow); margin-bottom: 7px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .settle-arrow { color: var(--rose); font-size: 16px; flex-shrink: 0; }
    .settle-amt { font-weight: 700; color: var(--rose); margin-left: auto; white-space: nowrap; }
    .split-check { display: flex; align-items: center; gap: 8px; padding: 7px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
    .split-check:last-child { border-bottom: none; }
    .split-check input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--sky); flex-shrink: 0; }
    .amount-row { position: relative; }
    .amount-row .prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-2); font-weight: 600; pointer-events: none; }
    .amount-row input { padding-left: 24px; }

    /* ── TAGEBUCH ── */
    .diary-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 10px; }
    .diary-hd { padding: 13px 16px; display: flex; align-items: center; cursor: pointer; gap: 10px; }
    .diary-hd:active { background: var(--bg); }
    .dh-left { flex: 1; min-width: 0; }
    .dh-date { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .today-badge { background: var(--sky); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
    .dh-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .dh-preview { font-size: 12px; color: var(--text-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dh-mood { font-size: 24px; flex-shrink: 0; }
    .dh-caret { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
    .diary-body { padding: 14px 16px 16px; border-top: 1px solid var(--border); }
    .df { margin-bottom: 14px; }
    .df:last-child { margin-bottom: 0; }
    .weather-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 6px; }
    .wopt { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); font-size: 19px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s; }
    .wopt.sel { border-color: var(--sky); background: var(--sky-l); }
    .mood-grid { display: flex; gap: 7px; margin-top: 6px; }
    .mopt { flex: 1; height: 42px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s; }
    .mopt.sel { border-color: var(--amber); background: var(--amber-l); }
    .diary-photo { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin: 8px 0 4px; display: block; }
    .file-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--sky-l); color: var(--sky-d); border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 6px; font-family: inherit; }

    /* FAB */
    .fab { position: fixed; right: 16px; bottom: calc(var(--tab-h) + var(--safe) + 14px); width: 52px; height: 52px; border-radius: 50%; background: var(--sky); color: #fff; border: none; box-shadow: 0 4px 14px rgba(14,165,233,.45); cursor: pointer; font-size: 28px; display: flex; align-items: center; justify-content: center; z-index: 90; transition: transform .15s, filter .15s; }
    .fab:active { transform: scale(.92); filter: brightness(.9); }
    @media (min-width: 480px) { .fab { right: calc((100vw - 480px) / 2 + 16px); } }

    .views > div { display: none; }
    .views > div.active { display: block; }
    .section-label { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 8px; }
    .chip-row { display: flex; gap: 8px; }
    .chip-row input { flex: 1; }
  </style>
</head>
<body>
<div id="app">
  <div id="content">
    <div class="views" id="views">
      <div id="v-reise" class="active"></div>
      <div id="v-pack"></div>
      <div id="v-kosten"></div>
      <div id="v-diary"></div>
    </div>
  </div>
  <nav>
    <button class="active" data-tab="reise" onclick="go('reise')"><span class="ni">🏝️</span>Reise</button>
    <button data-tab="pack" onclick="go('pack')"><span class="ni">🧳</span>Packliste</button>
    <button data-tab="kosten" onclick="go('kosten')"><span class="ni">💰</span>Kosten</button>
    <button data-tab="diary" onclick="go('diary')"><span class="ni">📔</span>Tagebuch</button>
  </nav>
</div>

<button class="fab" id="fab" onclick="fabAction()" style="display:none">+</button>

<!-- Trip Sheet -->
<div class="overlay" id="tripSheet" onclick="bgClose(event,'tripSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title">Reise planen ✈️</span>
        <button class="close-btn" onclick="closeSheet('tripSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Reisename</label>
        <input id="ts-name" type="text" placeholder="z.B. Sommerurlaub 2025" />
      </div>
      <div class="frow">
        <label class="label">Reiseziel 📍</label>
        <input id="ts-dest" type="text" placeholder="z.B. Mallorca" />
      </div>
      <div class="fgrid">
        <div class="frow">
          <label class="label">Abreise</label>
          <input id="ts-start" type="date" />
        </div>
        <div class="frow">
          <label class="label">Rückkehr</label>
          <input id="ts-end" type="date" />
        </div>
      </div>
      <div class="frow">
        <label class="label">Mitreisende 👥</label>
        <div class="chip-row">
          <input id="ts-person" type="text" placeholder="Name eingeben" onkeydown="if(event.key==='Enter'){addP();event.preventDefault()}" />
          <button class="btn btn-primary btn-sm" onclick="addP()">+</button>
        </div>
        <div class="chips" id="ts-chips"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveTrip()">Reise speichern</button>
    </div>
  </div>
</div>

<!-- Pack Sheet -->
<div class="overlay" id="packSheet" onclick="bgClose(event,'packSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title">Artikel hinzufügen 🧳</span>
        <button class="close-btn" onclick="closeSheet('packSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Artikel</label>
        <input id="pi-name" type="text" placeholder="z.B. Sonnencreme" />
      </div>
      <div class="fgrid">
        <div class="frow">
          <label class="label">Anzahl</label>
          <input id="pi-qty" type="number" min="1" value="1" />
        </div>
        <div class="frow">
          <label class="label">Kategorie</label>
          <select id="pi-cat">
            <option>Kleidung</option>
            <option>Hygiene</option>
            <option>Dokumente</option>
            <option>Technik</option>
            <option>Medizin</option>
            <option>Unterhaltung</option>
            <option>Sonstiges</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="savePack()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Expense Sheet -->
<div class="overlay" id="expSheet" onclick="bgClose(event,'expSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title">Ausgabe eintragen 💶</span>
        <button class="close-btn" onclick="closeSheet('expSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Beschreibung</label>
        <input id="ex-desc" type="text" placeholder="z.B. Tankfüllung, Dinner, ..." />
      </div>
      <div class="fgrid">
        <div class="frow">
          <label class="label">Betrag</label>
          <div class="amount-row">
            <span class="prefix">€</span>
            <input id="ex-amt" type="number" step="0.01" min="0" placeholder="0.00" />
          </div>
        </div>
        <div class="frow">
          <label class="label">Datum</label>
          <input id="ex-date" type="date" />
        </div>
      </div>
      <div class="frow">
        <label class="label">Bezahlt von</label>
        <select id="ex-paid"></select>
      </div>
      <div class="frow">
        <label class="label">Aufteilen mit</label>
        <div id="ex-split"></div>
      </div>
      <div class="frow">
        <label class="label">Kategorie</label>
        <select id="ex-cat">
          <option>Essen &amp; Trinken</option>
          <option>Transport</option>
          <option>Unterkunft</option>
          <option>Aktivitäten</option>
          <option>Einkaufen</option>
          <option>Sonstiges</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveExp()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const SKEY = 'urlaub-v1';
let S = { trip: null, packing: [], expenses: [], diary: {} };

function load() {
  try { const d = localStorage.getItem(SKEY); if (d) S = JSON.parse(d); } catch {}
}
function save() {
  try { localStorage.setItem(SKEY, JSON.stringify(S)); }
  catch { alert('Speicher voll! Bitte lösche einige Fotos im Tagebuch.'); }
}

// ── Navigation ──
let tab = 'reise';
function go(t) {
  tab = t;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.querySelectorAll('.views > div').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + t).classList.add('active');
  document.getElementById('fab').style.display = (t === 'pack' || t === 'kosten') ? 'flex' : 'none';
  render();
}
function fabAction() {
  if (tab === 'pack') { resetPackForm(); openSheet('packSheet'); }
  else if (tab === 'kosten') {
    if (!S.trip?.persons?.length) { alert('Bitte füge zuerst Mitreisende im Reise-Tab hinzu.'); return; }
    resetExpForm(); openSheet('expSheet');
  }
}

// ── Sheets ──
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

// ── Utils ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function fmtLong(d) { return new Date(d + 'T12:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' }); }
function fmtEur(n) { return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }
function daysBetween(a, b) { return Math.round((new Date(b + 'T12:00:00') - new Date(a + 'T12:00:00')) / 86400000); }

// ── Render ──
function render() {
  if (tab === 'reise') renderReise();
  else if (tab === 'pack') renderPack();
  else if (tab === 'kosten') renderKosten();
  else renderDiary();
}

// ── TAB 1: REISE ──
function renderReise() {
  const el = document.getElementById('v-reise');
  if (!S.trip) {
    el.innerHTML = `<div class="empty">
      <div class="ei">🏖️</div>
      <div class="et">Noch kein Urlaub geplant</div>
      <p>Lege deine Reise an und<br>zähle die Tage!</p>
      <button class="btn btn-primary" style="margin-top:20px" onclick="openTripSheet()">Reise anlegen ✈️</button>
    </div>`;
    return;
  }
  const t = S.trip;
  const now = today();
  const toStart = daysBetween(now, t.startDate);
  const totalDays = daysBetween(t.startDate, t.endDate);
  const started = toStart <= 0;
  const ended = daysBetween(now, t.endDate) < 0;

  let cdNum = '', cdLabel = '', cdSub = '', showProgress = false, progress = 0;
  if (ended) {
    cdNum = '✅'; cdLabel = 'Urlaub beendet'; cdSub = t.destination + ' war wunderschön! 🌟';
  } else if (started) {
    const dayOn = -toStart + 1;
    const toEnd = daysBetween(now, t.endDate);
    cdNum = dayOn; cdLabel = 'Tag ' + dayOn + ' von ' + totalDays;
    cdSub = toEnd <= 1 ? 'Letzter Urlaubstag 😢' : 'Noch ' + toEnd + ' Tage bis zur Rückkehr';
    showProgress = true;
    progress = Math.min(100, Math.round((dayOn / totalDays) * 100));
  } else {
    cdNum = toStart;
    cdLabel = toStart === 1 ? 'Noch 1 Tag!' : 'Tage noch';
    cdSub = 'bis zum Urlaub in ' + t.destination;
  }

  const personsHtml = (t.persons || []).map(p => `<span class="chip">${p}</span>`).join('');

  el.innerHTML = `
    <div class="cd-box">
      <div class="cd-num">${cdNum}</div>
      <div class="cd-label">${cdLabel}</div>
      <div class="cd-sub">${cdSub}</div>
      ${showProgress ? `<div class="pbar-wrap" style="margin-top:16px"><div class="pbar" style="width:${progress}%;background:var(--sky)"></div></div>` : ''}
    </div>
    <div class="card">
      <div class="trip-row">
        <span class="ri">✈️</span>
        <div><div class="rv">${t.name}</div><div class="rl">Reisename</div></div>
      </div>
      <div class="trip-row">
        <span class="ri">📍</span>
        <div><div class="rv">${t.destination}</div><div class="rl">Reiseziel</div></div>
      </div>
      <div class="trip-row">
        <span class="ri">🗓️</span>
        <div><div class="rv">${fmtDate(t.startDate)} – ${fmtDate(t.endDate)}</div><div class="rl">${totalDays} Nächte</div></div>
      </div>
      ${t.persons?.length ? `<div class="trip-row">
        <span class="ri">👥</span>
        <div><div class="chips" style="margin-top:4px">${personsHtml}</div><div class="rl" style="margin-top:4px">Mitreisende</div></div>
      </div>` : ''}
    </div>
    <button class="btn btn-ghost btn-sm" onclick="openTripSheet()">✏️ Reise bearbeiten</button>
  `;
}

let tempPersons = [];
function openTripSheet() {
  const t = S.trip || {};
  document.getElementById('ts-name').value = t.name || '';
  document.getElementById('ts-dest').value = t.destination || '';
  document.getElementById('ts-start').value = t.startDate || '';
  document.getElementById('ts-end').value = t.endDate || '';
  tempPersons = [...(t.persons || [])];
  renderTempChips();
  openSheet('tripSheet');
}
function renderTempChips() {
  document.getElementById('ts-chips').innerHTML = tempPersons.map((p, i) =>
    `<span class="chip">${p}<span class="x" onclick="removeP(${i})">✕</span></span>`).join('');
}
function addP() {
  const inp = document.getElementById('ts-person');
  const v = inp.value.trim();
  if (!v) return;
  tempPersons.push(v); inp.value = '';
  renderTempChips(); inp.focus();
}
function removeP(i) { tempPersons.splice(i, 1); renderTempChips(); }
function saveTrip() {
  const name = document.getElementById('ts-name').value.trim();
  const dest = document.getElementById('ts-dest').value.trim();
  const start = document.getElementById('ts-start').value;
  const end = document.getElementById('ts-end').value;
  if (!dest || !start || !end) { alert('Bitte Reiseziel und Daten eingeben.'); return; }
  if (end < start) { alert('Rückkehr darf nicht vor Abreise liegen.'); return; }
  S.trip = { name: name || dest, destination: dest, startDate: start, endDate: end, persons: [...tempPersons] };
  save(); closeSheet('tripSheet'); renderReise();
}

// ── TAB 2: PACKLISTE ──
const CAT_ICONS = { Kleidung: '👕', Hygiene: '🧴', Dokumente: '📄', Technik: '💻', Medizin: '💊', Unterhaltung: '🎮', Sonstiges: '📦' };

function renderPack() {
  const el = document.getElementById('v-pack');
  const items = S.packing;
  if (!items.length) {
    el.innerHTML = `<div class="empty"><div class="ei">🧳</div><div class="et">Packliste ist leer</div><p>Tippe auf <b>+</b>, um Artikel<br>hinzuzufügen.</p></div>`;
    return;
  }
  const packed = items.filter(i => i.packed).length;
  const pct = Math.round((packed / items.length) * 100);
  const byCat = {};
  items.forEach(i => { (byCat[i.category] = byCat[i.category] || []).push(i); });

  let html = `<div class="pack-stat">
    <div class="pbar-wrap" style="flex:1"><div class="pbar" style="width:${pct}%;background:var(--green)"></div></div>
    <span class="nums">${packed}/${items.length} eingepackt</span>
  </div>`;
  for (const [cat, list] of Object.entries(byCat)) {
    const done = list.filter(i => i.packed).length;
    html += `<div>
      <div class="cat-hd">${CAT_ICONS[cat] || '📦'} ${cat} <span style="color:var(--text-3);font-weight:400">(${done}/${list.length})</span></div>
      ${list.map(i => `
        <div class="pack-item${i.packed ? ' done' : ''}" onclick="togglePack('${i.id}')">
          <div class="pi-check">${i.packed ? '✓' : ''}</div>
          <span class="pi-name">${i.name}</span>
          ${i.qty > 1 ? `<span class="pi-qty">×${i.qty}</span>` : ''}
          <span class="pi-del" onclick="event.stopPropagation();deletePack('${i.id}')">🗑</span>
        </div>`).join('')}
    </div>`;
  }
  el.innerHTML = html;
}

function togglePack(id) {
  const item = S.packing.find(i => i.id === id);
  if (item) { item.packed = !item.packed; save(); renderPack(); }
}
function deletePack(id) { S.packing = S.packing.filter(i => i.id !== id); save(); renderPack(); }
function resetPackForm() { document.getElementById('pi-name').value = ''; document.getElementById('pi-qty').value = '1'; }
function savePack() {
  const name = document.getElementById('pi-name').value.trim();
  if (!name) { alert('Bitte Artikelname eingeben.'); return; }
  S.packing.push({ id: uid(), name, qty: parseInt(document.getElementById('pi-qty').value) || 1, category: document.getElementById('pi-cat').value, packed: false });
  save(); closeSheet('packSheet'); renderPack();
}

// ── TAB 3: KOSTEN ──
const EXP_ICONS = { 'Essen & Trinken': '🍽️', Transport: '🚗', Unterkunft: '🏨', Aktivitäten: '🎡', Einkaufen: '🛍️', Sonstiges: '📦' };

function renderKosten() {
  const el = document.getElementById('v-kosten');
  const exps = S.expenses;
  const persons = S.trip?.persons || [];
  const total = exps.reduce((s, e) => s + +e.amount, 0);
  const perPerson = persons.length ? total / persons.length : 0;
  const settlements = calcSettlements();

  let html = `<div class="cost-stats">
    <div class="cs-box"><div class="cs-num">${fmtEur(total)}</div><div class="cs-lbl">Gesamt</div></div>
    <div class="cs-box"><div class="cs-num">${exps.length}</div><div class="cs-lbl">Ausgaben</div></div>
    <div class="cs-box"><div class="cs-num">${persons.length ? fmtEur(perPerson) : '–'}</div><div class="cs-lbl">Pro Person</div></div>
  </div>`;

  if (settlements.length) {
    html += `<div class="card" style="padding:14px;margin-bottom:12px">
      <div class="card-hd"><span class="card-title">💸 Ausgleich</span></div>
      ${settlements.map(s => `<div class="settle-card">
        <span>${s.from}</span><span class="settle-arrow">→</span><span>${s.to}</span>
        <span class="settle-amt">${fmtEur(s.amount)}</span>
      </div>`).join('')}
    </div>`;
  }

  if (!exps.length) {
    html += `<div class="empty" style="padding-top:20px"><div class="ei">💰</div><p>Noch keine Ausgaben.<br>Tippe auf <b>+</b> zum Eintragen.</p></div>`;
  } else {
    html += `<div class="section-label">Alle Ausgaben</div>`;
    html += exps.slice().reverse().map(e => {
      const ds = e.date ? new Date(e.date + 'T12:00:00').toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) : '';
      const split = (e.splitWith || []).join(', ') || 'alle';
      return `<div class="exp-item">
        <div class="exp-ava">${EXP_ICONS[e.category] || '💶'}</div>
        <div class="exp-info">
          <div class="exp-desc">${e.desc}</div>
          <div class="exp-meta">${e.paidBy}${ds ? ' · ' + ds : ''} · ${e.category}</div>
          <div class="exp-meta">Aufgeteilt: ${split}</div>
        </div>
        <div class="exp-right">
          <span class="exp-amt">${fmtEur(+e.amount)}</span>
          <span class="exp-del" onclick="deleteExp('${e.id}')">🗑</span>
        </div>
      </div>`;
    }).join('');
  }
  el.innerHTML = html;
}

function calcSettlements() {
  const persons = S.trip?.persons || [];
  if (persons.length < 2) return [];
  const bal = {};
  persons.forEach(p => (bal[p] = 0));
  S.expenses.forEach(e => {
    const split = e.splitWith?.length ? e.splitWith : persons;
    const share = +e.amount / split.length;
    if (e.paidBy in bal) bal[e.paidBy] += +e.amount;
    split.forEach(p => { if (p in bal) bal[p] -= share; });
  });
  const cred = [], debt = [];
  Object.entries(bal).forEach(([p, b]) => {
    if (b > 0.005) cred.push([p, b]);
    else if (b < -0.005) debt.push([p, -b]);
  });
  const txns = [];
  let ci = 0, di = 0;
  while (ci < cred.length && di < debt.length) {
    const amt = Math.min(cred[ci][1], debt[di][1]);
    txns.push({ from: debt[di][0], to: cred[ci][0], amount: Math.round(amt * 100) / 100 });
    cred[ci][1] -= amt; debt[di][1] -= amt;
    if (cred[ci][1] < 0.005) ci++;
    if (debt[di][1] < 0.005) di++;
  }
  return txns;
}

function resetExpForm() {
  const persons = S.trip?.persons || [];
  document.getElementById('ex-desc').value = '';
  document.getElementById('ex-amt').value = '';
  document.getElementById('ex-date').value = today();
  document.getElementById('ex-paid').innerHTML = persons.map(p => `<option>${p}</option>`).join('');
  document.getElementById('ex-split').innerHTML = persons.map(p =>
    `<label class="split-check"><input type="checkbox" value="${p}" checked />${p}</label>`).join('');
  document.getElementById('ex-cat').value = 'Essen & Trinken';
}
function saveExp() {
  const desc = document.getElementById('ex-desc').value.trim();
  const amount = parseFloat(document.getElementById('ex-amt').value);
  if (!desc || isNaN(amount) || amount <= 0) { alert('Beschreibung und Betrag eingeben.'); return; }
  const splitWith = [...document.querySelectorAll('#ex-split input:checked')].map(i => i.value);
  S.expenses.push({ id: uid(), desc, amount, date: document.getElementById('ex-date').value, paidBy: document.getElementById('ex-paid').value, splitWith, category: document.getElementById('ex-cat').value });
  save(); closeSheet('expSheet'); renderKosten();
}
function deleteExp(id) {
  if (!confirm('Ausgabe löschen?')) return;
  S.expenses = S.expenses.filter(e => e.id !== id);
  save(); renderKosten();
}

// ── TAB 4: TAGEBUCH ──
const WEATHERS = ['☀️', '⛅', '🌤️', '🌧️', '⛈️', '❄️'];
const MOODS = ['🥳', '😃', '😊', '😐', '😔', '😴'];

function renderDiary() {
  const el = document.getElementById('v-diary');
  if (!S.trip) {
    el.innerHTML = `<div class="empty"><div class="ei">📔</div><div class="et">Kein Urlaub geplant</div><p>Lege zuerst eine Reise<br>im Reise-Tab an.</p></div>`;
    return;
  }
  const days = tripDays();
  if (!days.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📔</div><p>Keine Urlaubstage gefunden.</p></div>`;
    return;
  }
  const now = today();
  el.innerHTML = days.map((d, idx) => {
    const entry = S.diary[d] || {};
    const isToday = d === now;
    const preview = [entry.weather, entry.activities ? entry.activities.slice(0, 35) : ''].filter(Boolean).join(' ');

    return `<div class="diary-card">
      <div class="diary-hd" onclick="toggleDay('${d}')">
        <div class="dh-left">
          <div class="dh-date">Tag ${idx + 1}${isToday ? ' <span class="today-badge">Heute</span>' : ''}</div>
          <div class="dh-sub">${fmtLong(d)}</div>
          <div class="dh-preview">${preview || 'Noch nichts eingetragen'}</div>
        </div>
        <span class="dh-mood">${entry.mood || '📔'}</span>
        <span class="dh-caret" id="dc-${d}">▼</span>
      </div>
      <div class="diary-body" id="db-${d}" style="display:none">
        <div class="df">
          <label class="label">🌤 Wetter</label>
          <div class="weather-grid">${WEATHERS.map(w =>
      `<button class="wopt${entry.weather === w ? ' sel' : ''}" onclick="setDF('${d}','weather','${w}')">${w}</button>`).join('')}
          </div>
        </div>
        <div class="df">
          <label class="label">😊 Stimmung</label>
          <div class="mood-grid">${MOODS.map(m =>
      `<button class="mopt${entry.mood === m ? ' sel' : ''}" onclick="setDF('${d}','mood','${m}')">${m}</button>`).join('')}
          </div>
        </div>
        <div class="df">
          <label class="label">🎯 Was haben wir gemacht?</label>
          <textarea placeholder="Aktivitäten des Tages..." oninput="setDF('${d}','activities',this.value)">${entry.activities || ''}</textarea>
        </div>
        <div class="df">
          <label class="label">🍽️ Was haben wir gegessen?</label>
          <textarea placeholder="Leckeres Essen & Restaurants..." oninput="setDF('${d}','food',this.value)">${entry.food || ''}</textarea>
        </div>
        <div class="df">
          <label class="label">✨ Highlight des Tages</label>
          <input type="text" placeholder="Das Schönste heute war..." value="${(entry.highlight || '').replace(/"/g, '&quot;')}" oninput="setDF('${d}','highlight',this.value)" />
        </div>
        <div class="df">
          <label class="label">📷 Foto des Tages</label>
          <div id="dph-${d}">${entry.photo ? `<img src="${entry.photo}" class="diary-photo" />` : ''}</div>
          <label class="file-btn">📷 Foto auswählen<input type="file" accept="image/*" style="display:none" onchange="setPhoto('${d}',this)" /></label>
          ${entry.photo ? `<button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="removePhoto('${d}')">Löschen</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  // Auto-expand today
  if (days.includes(now)) toggleDay(now);
}

function tripDays() {
  if (!S.trip) return [];
  const days = [];
  const cur = new Date(S.trip.startDate + 'T12:00:00');
  const end = new Date(S.trip.endDate + 'T12:00:00');
  while (cur <= end) {
    days.push(cur.toISOString().slice(0, 10));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

function toggleDay(d) {
  const body = document.getElementById('db-' + d);
  const caret = document.getElementById('dc-' + d);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (caret) caret.textContent = open ? '▼' : '▲';
}

function setDF(d, field, val) {
  if (!S.diary[d]) S.diary[d] = {};
  S.diary[d][field] = val;
  save();
  const entry = S.diary[d];
  // Update preview text in header
  const card = document.getElementById('db-' + d)?.closest('.diary-card');
  if (card) {
    const prev = card.querySelector('.dh-preview');
    if (prev) {
      const p = [entry.weather, entry.activities ? entry.activities.slice(0, 35) : ''].filter(Boolean).join(' ');
      prev.textContent = p || 'Noch nichts eingetragen';
    }
    const moodEl = card.querySelector('.dh-mood');
    if (moodEl) moodEl.textContent = entry.mood || '📔';
  }
  // Toggle selection state
  const body = document.getElementById('db-' + d);
  if (field === 'weather' && body) body.querySelectorAll('.wopt').forEach(b => b.classList.toggle('sel', b.textContent.trim() === val));
  if (field === 'mood' && body) body.querySelectorAll('.mopt').forEach(b => b.classList.toggle('sel', b.textContent.trim() === val));
}

function setPhoto(d, input) {
  const file = input.files[0];
  if (!file) return;
  const imgEl = new Image();
  const objUrl = URL.createObjectURL(file);
  imgEl.onload = () => {
    const MAX = 900;
    let w = imgEl.width, h = imgEl.height;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(imgEl, 0, 0, w, h);
    URL.revokeObjectURL(objUrl);
    const data = c.toDataURL('image/jpeg', 0.72);
    if (!S.diary[d]) S.diary[d] = {};
    S.diary[d].photo = data;
    save();
    const wrap = document.getElementById('dph-' + d);
    if (wrap) wrap.innerHTML = `<img src="${data}" class="diary-photo" />`;
  };
  imgEl.src = objUrl;
}

function removePhoto(d) {
  if (S.diary[d]) { delete S.diary[d].photo; save(); }
  const wrap = document.getElementById('dph-' + d);
  if (wrap) wrap.innerHTML = '';
}

// ── Init ──
load();
render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
