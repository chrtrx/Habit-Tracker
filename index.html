<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fernweh">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Fernweh</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap">
  <script src="https://unpkg.com/globe.gl@2.34.5/dist/globe.gl.min.js" defer onload="if(typeof tab!=='undefined'&&tab==='karte')renderKarte()"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sky: #0ea5e9;
      --sky-d: #0369a1;
      --sky-l: #e0f2fe;
      --amber: #f59e0b;
      --amber-l: #fef3c7;
      --green: #10b981;
      --green-l: #d1fae5;
      --rose: #f43f5e;
      --rose-l: #ffe4e6;
      --bg: #f4f8fb;
      --surface: #ffffff;
      --border: #e5eaf0;
      --text: #0f172a;
      --text-2: #64748b;
      --text-3: #94a3b8;
      --radius: 18px;
      --radius-sm: 12px;
      --shadow: 0 1px 3px rgba(15,23,42,.07), 0 1px 2px rgba(15,23,42,.04);
      --shadow-md: 0 8px 24px rgba(2,132,199,.12);
      --tab-h: 64px;
      --safe: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    #app { display: flex; flex-direction: column; min-height: 100%; max-width: 480px; margin: 0 auto; }
    #content { flex: 1; padding: 14px 16px calc(var(--tab-h) + var(--safe) + 24px); overflow-x: hidden; }

    /* Tab bar */
    nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: calc(var(--tab-h) + var(--safe)); background: rgba(255,255,255,.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: var(--safe); }
    nav button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; padding: 7px 4px; font-size: 10.5px; color: var(--text-3); font-weight: 600; transition: color .2s; font-family: inherit; }
    nav button .ni { font-size: 21px; line-height: 1; padding: 3px 14px; border-radius: 14px; transition: background .25s, transform .25s; }
    nav button.active { color: var(--sky-d); }
    nav button.active .ni { background: var(--sky-l); transform: translateY(-1px); }

    /* Page title */
    .page-title { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin: 4px 2px 14px; display: flex; align-items: center; justify-content: space-between; }
    .page-title .pt-sub { font-size: 12px; font-weight: 600; color: var(--text-2); }

    /* Cards */
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; animation: rise .35s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 800; color: var(--text-2); text-transform: uppercase; letter-spacing: .07em; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 700; padding: 12px 18px; transition: filter .15s, transform .1s; font-family: inherit; }
    .btn:active { filter: brightness(.92); transform: scale(.98); }
    .btn-primary { background: var(--sky); color: #fff; box-shadow: 0 3px 10px rgba(14,165,233,.35); }
    .btn-ghost { background: transparent; color: var(--sky-d); border: 1.5px solid rgba(14,165,233,.4); }
    .btn-sm { padding: 8px 13px; font-size: 13px; border-radius: 10px; }
    .btn-danger { background: var(--rose-l); color: var(--rose); }
    .btn-full { width: 100%; margin-top: 8px; }

    /* Inputs */
    input[type=text], input[type=number], input[type=date], select, textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 16px; color: var(--text); background: var(--surface); outline: none; transition: border-color .15s, box-shadow .15s; font-family: inherit; appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(14,165,233,.12); }
    textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .label { display: block; font-size: 12px; font-weight: 700; color: var(--text-2); margin-bottom: 5px; }
    .frow { margin-bottom: 13px; }
    .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Progress bars */
    .pbar-wrap { background: rgba(15,23,42,.08); border-radius: 8px; height: 8px; overflow: hidden; }
    .pbar { height: 100%; border-radius: 8px; transition: width .6s cubic-bezier(.3,.8,.3,1); }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 3px; background: var(--sky-l); border-radius: 20px; padding: 4px 11px; font-size: 13px; font-weight: 600; color: var(--sky-d); }
    .chip .x { cursor: pointer; color: var(--text-3); margin-left: 2px; line-height: 1; }

    /* Empty state */
    .empty { text-align: center; padding: 46px 20px; color: var(--text-2); animation: rise .35s ease both; }
    .empty .ei { font-size: 56px; margin-bottom: 14px; display: block; }
    .empty .et { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; }

    /* Sheets */
    .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet { background: var(--surface); border-radius: 26px 26px 0 0; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform .32s cubic-bezier(.32,.72,0,1); }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-inner { padding: 22px 20px calc(22px + var(--safe)); }
    .sheet-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .sheet-title { font-size: 18px; font-weight: 800; }
    .close-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); border: none; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); }

    /* ═══ REISE: Hero ═══ */
    .hero { position: relative; border-radius: 22px; padding: 26px 20px 24px; margin-bottom: 14px; overflow: hidden; color: #fff; background: linear-gradient(160deg, #0284c7 0%, #0ea5e9 42%, #38bdf8 75%, #7dd3fc 100%); box-shadow: var(--shadow-md); animation: rise .35s ease both; }
    .hero::before { content: ''; position: absolute; top: -46px; right: -40px; width: 160px; height: 160px; background: rgba(255,255,255,.12); border-radius: 50%; }
    .hero::after { content: ''; position: absolute; bottom: -60px; left: -30px; width: 140px; height: 140px; background: rgba(255,255,255,.08); border-radius: 50%; }
    .hero-deco { position: absolute; top: 18px; right: 18px; font-size: 30px; opacity: .9; animation: floaty 4s ease-in-out infinite; }
    @keyframes floaty { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-7px) rotate(5deg); } }
    .hero-kicker { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; opacity: .85; position: relative; }
    .hero-dest { font-size: 30px; font-weight: 900; letter-spacing: -.02em; margin-top: 2px; position: relative; text-shadow: 0 2px 8px rgba(2,132,199,.3); }
    .cd-units { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 20px; position: relative; }
    .cd-unit { background: rgba(255,255,255,.17); border: 1px solid rgba(255,255,255,.25); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); border-radius: 14px; padding: 12px 4px 9px; text-align: center; }
    .cd-val { font-size: 27px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; }
    .cd-key { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; opacity: .85; margin-top: 4px; }
    .hero-big { font-size: 76px; font-weight: 900; line-height: 1; text-align: center; margin-top: 18px; position: relative; text-shadow: 0 3px 12px rgba(2,132,199,.35); }
    .hero-sub { text-align: center; font-size: 14px; font-weight: 600; opacity: .92; margin-top: 8px; position: relative; }
    .hero .pbar-wrap { background: rgba(255,255,255,.25); margin-top: 16px; position: relative; }
    .hero .pbar { background: #fff; }

    /* Boarding pass */
    .bpass { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; animation: rise .35s ease both; }
    .bpass-top { padding: 16px 18px 14px; }
    .bpass-route { display: flex; align-items: center; gap: 10px; }
    .bpass-pt { flex-shrink: 0; }
    .bpass-city { font-size: 17px; font-weight: 800; letter-spacing: -.01em; }
    .bpass-lbl { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
    .bpass-line { flex: 1; display: flex; align-items: center; gap: 4px; color: var(--sky); min-width: 40px; }
    .bpass-line::before, .bpass-line::after { content: ''; flex: 1; border-top: 2px dashed rgba(14,165,233,.4); }
    .bpass-mid { border-top: 2px dashed var(--border); position: relative; }
    .bpass-mid::before, .bpass-mid::after { content: ''; position: absolute; top: -9px; width: 18px; height: 18px; background: var(--bg); border-radius: 50%; }
    .bpass-mid::before { left: -9px; }
    .bpass-mid::after { right: -9px; }
    .bpass-bottom { padding: 13px 18px 15px; display: flex; gap: 18px; flex-wrap: wrap; }
    .bpass-cell .bc-v { font-size: 14px; font-weight: 700; }
    .bpass-cell .bc-l { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }

    .tool-row { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }

    /* ═══ PACKLISTE ═══ */
    .pack-stat { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 13px 16px; margin-bottom: 12px; animation: rise .35s ease both; }
    .pack-stat .nums { font-size: 13px; color: var(--text-2); white-space: nowrap; font-weight: 700; }
    .tpl-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 10px; scrollbar-width: none; }
    .tpl-row::-webkit-scrollbar { display: none; }
    .tpl-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; }
    .tpl-btn:active { border-color: var(--sky); background: var(--sky-l); }
    .cat-hd { font-size: 12px; font-weight: 800; color: var(--text-2); text-transform: uppercase; letter-spacing: .07em; padding: 12px 2px 7px; display: flex; align-items: center; gap: 6px; }
    .pack-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: var(--radius-sm); padding: 11px 12px; margin-bottom: 6px; box-shadow: var(--shadow); cursor: pointer; transition: background .2s, opacity .2s; }
    .pack-item.done { background: var(--green-l); }
    .pi-check { width: 23px; height: 23px; border-radius: 50%; border: 2px solid var(--text-3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: transparent; transition: all .2s; }
    .pack-item.done .pi-check { background: var(--green); border-color: var(--green); color: #fff; }
    .pi-name { flex: 1; font-size: 14.5px; font-weight: 500; }
    .pack-item.done .pi-name { text-decoration: line-through; color: var(--text-2); }
    .pi-qty { font-size: 12px; font-weight: 700; color: var(--sky-d); background: var(--sky-l); padding: 2px 8px; border-radius: 10px; }
    .pi-del { color: var(--text-3); font-size: 15px; padding: 3px 4px; cursor: pointer; }

    /* Confetti */
    .confetti { position: fixed; top: -30px; z-index: 500; font-size: 22px; pointer-events: none; animation: cfall linear forwards; }
    @keyframes cfall { to { transform: translateY(110vh) rotate(720deg); } }

    /* ═══ KOSTEN ═══ */
    .budget-card { background: linear-gradient(145deg, #fef3c7, #fff7ed); border-radius: var(--radius); padding: 15px 16px; margin-bottom: 12px; box-shadow: var(--shadow); animation: rise .35s ease both; }
    .budget-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
    .budget-title { font-size: 12px; font-weight: 800; color: #92400e; text-transform: uppercase; letter-spacing: .07em; }
    .budget-nums { font-size: 14px; font-weight: 800; color: #92400e; }
    .budget-edit { background: none; border: none; font-size: 14px; cursor: pointer; padding: 2px 4px; }
    .cost-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .cs-box { background: var(--surface); border-radius: var(--radius-sm); padding: 13px 8px; text-align: center; box-shadow: var(--shadow); animation: rise .35s ease both; }
    .cs-num { font-size: 17px; font-weight: 900; color: var(--sky-d); line-height: 1.2; }
    .cs-lbl { font-size: 11px; font-weight: 600; color: var(--text-2); margin-top: 2px; }
    .catbar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
    .catbar-ico { font-size: 17px; width: 24px; text-align: center; flex-shrink: 0; }
    .catbar-mid { flex: 1; min-width: 0; }
    .catbar-name { font-size: 12.5px; font-weight: 700; display: flex; justify-content: space-between; margin-bottom: 3px; }
    .catbar-name span:last-child { color: var(--text-2); font-weight: 600; }
    .person-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .person-row:last-child { border-bottom: none; }
    .pr-ava { width: 34px; height: 34px; border-radius: 50%; background: var(--sky-l); color: var(--sky-d); font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pr-info { flex: 1; }
    .pr-name { font-size: 14px; font-weight: 700; }
    .pr-sub { font-size: 12px; color: var(--text-2); }
    .pr-bal { font-weight: 800; font-size: 14px; white-space: nowrap; }
    .pr-bal.pos { color: var(--green); }
    .pr-bal.neg { color: var(--rose); }
    .pr-bal.zero { color: var(--text-3); }
    .exp-item { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; box-shadow: var(--shadow); }
    .exp-ava { width: 38px; height: 38px; border-radius: 12px; background: var(--sky-l); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .exp-info { flex: 1; min-width: 0; }
    .exp-desc { font-weight: 700; font-size: 14px; }
    .exp-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .exp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .exp-amt { font-weight: 800; font-size: 15px; }
    .exp-del { font-size: 14px; cursor: pointer; color: var(--text-3); }
    .settle-card { border-radius: var(--radius-sm); padding: 11px 13px; background: var(--surface); box-shadow: var(--shadow); margin-bottom: 7px; display: flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 600; }
    .settle-arrow { color: var(--rose); font-size: 16px; flex-shrink: 0; }
    .settle-amt { font-weight: 800; color: var(--rose); margin-left: auto; white-space: nowrap; }
    .settle-ok { width: 30px; height: 30px; border-radius: 50%; background: var(--green-l); color: var(--green); border: none; font-size: 14px; font-weight: 800; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .exp-item.transfer { background: var(--green-l); }
    .exp-item.transfer .exp-ava { background: rgba(255,255,255,.7); }
    .psel { display: flex; flex-wrap: wrap; gap: 8px; }
    .psel-chip { display: inline-flex; align-items: center; gap: 7px; border: 2px solid var(--border); background: var(--bg); border-radius: 22px; padding: 8px 14px 8px 9px; font-size: 14px; font-weight: 700; cursor: pointer; transition: border-color .15s, background .15s; font-family: inherit; color: var(--text); }
    .psel-chip .pa { width: 22px; height: 22px; border-radius: 50%; background: var(--text-3); color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .psel-chip.sel { border-color: var(--sky); background: var(--sky-l); color: var(--sky-d); }
    .psel-chip.sel .pa { background: var(--sky); }
    .amount-row { position: relative; }
    .amount-row .prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-2); font-weight: 700; pointer-events: none; }
    .amount-row input { padding-left: 25px; }

    /* ═══ TAGEBUCH – Papier-Look ═══ */
    :root { --paper: #fffdf6; --paper-line: #e7ddc2; --paper-edge: #efe6d0; --ink: #3d3524; --ink-soft: #8a7d5a; }
    .diary-card { background: var(--paper); border: 1px solid var(--paper-edge); border-radius: var(--radius); box-shadow: 0 2px 6px rgba(120,95,40,.10); overflow: hidden; margin-bottom: 11px; animation: rise .35s ease both; }
    .diary-hd { padding: 13px 16px; display: flex; align-items: center; cursor: pointer; gap: 11px; }
    .diary-hd:active { background: #f7f1e0; }
    .dh-num { width: 42px; height: 42px; border-radius: 12px; background: #fff; border: 1.5px solid var(--paper-edge); color: var(--rose); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; box-shadow: 0 1px 3px rgba(120,95,40,.12); }
    .dh-num b { font-size: 17px; font-weight: 900; }
    .dh-num span { font-size: 8.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; margin-top: 1px; color: var(--ink-soft); }
    .diary-card.today .dh-num { background: var(--sky); border-color: var(--sky); color: #fff; }
    .diary-card.today .dh-num span { color: #e0f2fe; }
    .dh-left { flex: 1; min-width: 0; }
    .dh-date { font-family: 'Caveat', cursive; font-weight: 700; font-size: 21px; line-height: 1.1; color: var(--ink); display: flex; align-items: center; gap: 7px; }
    .today-badge { background: var(--sky); color: #fff; font-size: 10px; font-weight: 800; padding: 1.5px 7px; border-radius: 10px; font-family: -apple-system, sans-serif; }
    .dh-preview { font-size: 12px; color: var(--ink-soft); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dh-mood { font-size: 24px; flex-shrink: 0; }
    .dh-caret { font-size: 11px; color: var(--text-3); flex-shrink: 0; transition: transform .25s; }
    .diary-card.open .dh-caret { transform: rotate(180deg); }
    .diary-body { padding: 15px 16px 18px; border-top: 1.5px dashed var(--paper-line); display: none; }
    .diary-card.open .diary-body { display: block; }
    .df { margin-bottom: 17px; }
    .df:last-child { margin-bottom: 0; }
    .diary-body .label { font-family: 'Caveat', cursive; font-size: 20px; font-weight: 700; color: var(--ink-soft); text-transform: none; letter-spacing: 0; margin-bottom: 2px; }
    .diary-body textarea {
      background: transparent; border: none; border-radius: 0; padding: 0 2px 6px;
      font-family: Georgia, 'Times New Roman', serif; font-size: 17px; color: var(--ink); line-height: 30px; min-height: 92px;
      background-image: repeating-linear-gradient(transparent 0px, transparent 29px, var(--paper-line) 29px, var(--paper-line) 30px);
      background-attachment: local; field-sizing: content; box-shadow: none;
    }
    .diary-body input[type=text] {
      background: transparent; border: none; border-bottom: 1.5px dashed var(--paper-line); border-radius: 0; padding: 4px 2px;
      font-family: Georgia, 'Times New Roman', serif; font-size: 17px; color: var(--ink); box-shadow: none;
    }
    .diary-body textarea:focus, .diary-body input[type=text]:focus { box-shadow: none; border-color: var(--ink-soft); }
    .diary-body ::placeholder { color: #c4b78f; font-style: italic; }
    .weather-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 6px; }
    .wopt { width: 42px; height: 42px; border-radius: 12px; border: 2px solid var(--paper-edge); background: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s, transform .1s; }
    .wopt:active { transform: scale(.9); }
    .wopt.sel { border-color: var(--sky); background: var(--sky-l); }
    .mood-grid { display: flex; gap: 7px; margin-top: 6px; }
    .mopt { flex: 1; height: 44px; border-radius: 12px; border: 2px solid var(--paper-edge); background: #fff; font-size: 21px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s, transform .1s; }
    .mopt:active { transform: scale(.9); }
    .mopt.sel { border-color: var(--amber); background: var(--amber-l); }
    /* Fotos als Polaroids */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; padding: 4px 2px; }
    .photo-cell { position: relative; aspect-ratio: 1; background: #fff; border: 5px solid #fff; border-bottom-width: 16px; border-radius: 3px; box-shadow: 0 3px 9px rgba(80,60,20,.22); transform: rotate(-2.2deg); }
    .photo-cell:nth-child(even) { transform: rotate(1.8deg); }
    .photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .photo-x { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%; background: rgba(15,23,42,.65); color: #fff; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .file-btn { display: inline-flex; align-items: center; gap: 6px; background: #fff; color: var(--ink-soft); border: 1.5px dashed var(--paper-line); border-radius: 10px; padding: 8px 13px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 10px; font-family: inherit; }
    .lightbox { position: fixed; inset: 0; background: rgba(15,23,42,.92); z-index: 400; display: none; align-items: center; justify-content: center; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; }

    /* FAB */
    .fab { position: fixed; right: 16px; bottom: calc(var(--tab-h) + var(--safe) + 14px); width: 54px; height: 54px; border-radius: 50%; background: var(--sky); color: #fff; border: none; box-shadow: 0 5px 16px rgba(14,165,233,.5); cursor: pointer; font-size: 28px; display: flex; align-items: center; justify-content: center; z-index: 90; transition: transform .15s, filter .15s; }
    .fab:active { transform: scale(.9); filter: brightness(.9); }
    @media (min-width: 480px) { .fab { right: calc((100vw - 480px) / 2 + 16px); } }

    /* ═══ ROUTE / KARTE ═══ */
    .map-card { background: #eaf4fb; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 12px; animation: rise .35s ease both; }
    #map { height: 360px; width: 100%; z-index: 1; position: relative; }
    #map canvas { touch-action: none; }
    .step-marker { width: 28px; height: 28px; border-radius: 50%; background: var(--sky); border: 2.5px solid #fff; color: #fff; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(2,132,199,.5); }
    .step-item { display: flex; align-items: center; gap: 11px; background: var(--surface); border-radius: var(--radius-sm); padding: 11px 12px; margin-bottom: 7px; box-shadow: var(--shadow); cursor: pointer; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--sky-l); color: var(--sky-d); font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-name { font-weight: 700; font-size: 14px; }
    .step-meta { font-size: 12px; color: var(--text-2); }
    .geo-results { margin-top: 6px; }
    .geo-item { padding: 9px 11px; background: var(--bg); border-radius: 9px; margin-bottom: 5px; font-size: 13px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .geo-item:active { background: var(--sky-l); }

    .views > div { display: none; }
    .views > div.active { display: block; }
    .section-label { font-size: 12px; font-weight: 800; color: var(--text-2); text-transform: uppercase; letter-spacing: .07em; margin: 16px 2px 8px; }
    .chip-row { display: flex; gap: 8px; }
    .chip-row input { flex: 1; }
  </style>
</head>
<body>
<div id="app">
  <div id="content">
    <div class="views" id="views">
      <div id="v-reise" class="active"></div>
      <div id="v-karte"></div>
      <div id="v-pack"></div>
      <div id="v-kosten"></div>
      <div id="v-diary"></div>
    </div>
  </div>
  <nav>
    <button class="active" data-tab="reise" onclick="go('reise')"><span class="ni">🏝️</span>Reise</button>
    <button data-tab="karte" onclick="go('karte')"><span class="ni">🌍</span>Route</button>
    <button data-tab="pack" onclick="go('pack')"><span class="ni">🧳</span>Packen</button>
    <button data-tab="kosten" onclick="go('kosten')"><span class="ni">💰</span>Kosten</button>
    <button data-tab="diary" onclick="go('diary')"><span class="ni">📔</span>Tagebuch</button>
  </nav>
</div>

<button class="fab" id="fab" onclick="fabAction()" style="display:none">+</button>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightboxImg" alt=""></div>

<!-- Trip Sheet -->
<div class="overlay" id="tripSheet" onclick="bgClose(event,'tripSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title">Reise planen ✈️</span>
        <button class="close-btn" onclick="closeSheet('tripSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Reisename</label>
        <input id="ts-name" type="text" placeholder="z.B. Sommerurlaub 2026" />
      </div>
      <div class="frow">
        <label class="label">Reiseziel 📍</label>
        <input id="ts-dest" type="text" placeholder="z.B. Mallorca" />
      </div>
      <div class="fgrid">
        <div class="frow">
          <label class="label">Abreise</label>
          <input id="ts-start" type="date" />
        </div>
        <div class="frow">
          <label class="label">Rückkehr</label>
          <input id="ts-end" type="date" />
        </div>
      </div>
      <div class="frow">
        <label class="label">Mitreisende 👥</label>
        <div class="chip-row">
          <input id="ts-person" type="text" placeholder="Name eingeben" onkeydown="if(event.key==='Enter'){addP();event.preventDefault()}" />
          <button class="btn btn-primary btn-sm" onclick="addP()">+</button>
        </div>
        <div class="chips" id="ts-chips"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveTrip()">Reise speichern</button>
    </div>
  </div>
</div>

<!-- Pack Sheet -->
<div class="overlay" id="packSheet" onclick="bgClose(event,'packSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title">Artikel hinzufügen 🧳</span>
        <button class="close-btn" onclick="closeSheet('packSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Artikel</label>
        <input id="pi-name" type="text" placeholder="z.B. Sonnencreme" onkeydown="if(event.key==='Enter'){savePack();event.preventDefault()}" />
      </div>
      <div class="fgrid">
        <div class="frow">
          <label class="label">Anzahl</label>
          <input id="pi-qty" type="number" min="1" value="1" />
        </div>
        <div class="frow">
          <label class="label">Kategorie</label>
          <select id="pi-cat">
            <option>Kleidung</option>
            <option>Hygiene</option>
            <option>Dokumente</option>
            <option>Technik</option>
            <option>Medizin</option>
            <option>Unterhaltung</option>
            <option>Sonstiges</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="savePack()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Expense Sheet -->
<div class="overlay" id="expSheet" onclick="bgClose(event,'expSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title" id="ex-title">Ausgabe eintragen 💶</span>
        <button class="close-btn" onclick="closeSheet('expSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Beschreibung</label>
        <input id="ex-desc" type="text" placeholder="z.B. Tankfüllung, Dinner, ..." />
      </div>
      <div class="fgrid">
        <div class="frow">
          <label class="label">Betrag</label>

            <span class="prefix">€</span>

      <div class="frow">
        <label class="label">🤝 Für wen war das? <span style="font-weight:500;color:var(--text-3)">(alle antippen, die mitzahlen)</span></label>

</div>

<!-- Budget Sheet -->
<div class="overlay" id="budgetSheet" onclick="bgClose(event,'budgetSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">

      </div>
      <div class="frow">
        <label class="label">Budget für die gesamte Reise</label>

<!-- News Sheet (Was ist neu) -->

</div>

<!-- Memory Sheet (Erinnerungen) -->

</div>

<!-- Step Sheet (Route) -->
<div class="overlay" id="stepSheet" onclick="bgClose(event,'stepSheet')">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-hd">
        <span class="sheet-title">Ort zur Route hinzufügen 📍</span>
        <button class="close-btn" onclick="closeSheet('stepSheet')">✕</button>
      </div>
      <div class="frow">
        <label class="label">Ort suchen</label>
        <input id="st-q" type="text" placeholder="z.B. Palma de Mallorca" autocomplete="off" oninput="stepSearchDebounced()" />
        <div id="st-results" class="geo-results"></div>
      </div>
      <button class="file-btn" style="margin-top:0" onclick="useMyLocation()">📡 Aktuellen Standort verwenden</button>
      <div id="st-sel" style="margin:10px 2px;font-size:13.5px;font-weight:700;color:var(--sky-d);min-height:18px"></div>

        <div class="frow">
          <label class="label">Datum</label>
          <input id="st-date" type="date" />

          <label class="label">Notiz (optional)</label>

        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveStep()">Zur Route hinzufügen</button>
    </div>
  </div>
</div>

<script>
// ═══ State ═══
const SKEY = 'urlaub-v1';
let S = { trip: null, budget: 0, packing: [], expenses: [], diary: {}, steps: [], archive: [] };

// Foto-Cache: Bilddaten bleiben lokal, in S stehen nur kleine Referenzen {id, bin}
const PCKEY = 'urlaub-photos';
let PC = {};
function loadPC() { try { PC = JSON.parse(localStorage.getItem(PCKEY)) || {}; } catch { PC = {}; } }
function savePC() {
  try { localStorage.setItem(PCKEY, JSON.stringify(PC)); }
  catch { alert('Fotospeicher voll! Bitte lösche alte Fotos.'); }
}

function migratePhotos() {
  let touched = false;
  const fix = e => {
    if (!e) return;
    if (e.photo) { e.photos = e.photos || []; e.photos.push(e.photo); delete e.photo; touched = true; }
    if (e.photos) e.photos = e.photos.map(p => {
      if (typeof p === 'string') { const id = 'p' + uid(); PC[id] = p; touched = true; return { id, bin: null }; }
      return p;
    });
  };
  Object.values(S.diary || {}).forEach(fix);
  (S.archive || []).forEach(a => Object.values(a.diary || {}).forEach(fix));
  if (touched) savePC();
}

function load() {
  try { const d = localStorage.getItem(SKEY); if (d) S = Object.assign({ trip: null, budget: 0, packing: [], expenses: [], diary: {}, steps: [], archive: [] }, JSON.parse(d)); } catch {}
  loadPC();
  migratePhotos();
}
function save() {
  if (!applyingRemote) S.updatedAt = Date.now();
  try { localStorage.setItem(SKEY, JSON.stringify(S)); }
  catch { alert('Speicher voll! Bitte lösche einige Fotos im Tagebuch.'); }
  if (sync && !applyingRemote) {
    clearTimeout(pushTimer);
    pushTimer = setTimeout(syncPush, 1500);
  }
}

// ═══ Was ist neu? ═══
const APP_VERSION = '2.1';
const CHANGELOG = [
  {
    v: '2.1', title: 'Gemeinsame Kasse & Tagebuch-Look', items: [
      '👫 <b>Gemeinsame Kasse</b> bei den Kosten: vom gemeinsamen Konto bezahlt = niemand schuldet niemandem etwas',
      '📖 Tagebuch im echten <b>Papier-Look</b> mit linierten Seiten, Handschrift und Polaroid-Fotos',
      '🏝️ Aufgeräumte Startseite mit kompakter Sync-Zeile',
      '✈️ Neuer Name <b>Fernweh</b> und neues App-Icon',
      '✨ Diese „Was ist neu?"-Liste'
    ]
  },
  {
    v: '2.0', title: 'Weltkugel, Foto-Sync & Erinnerungen', items: [
      '🌍 <b>3D-Weltkugel</b> mit Flugbögen statt flacher Karte',
      '📷 <b>Fotos synchronisieren</b> jetzt auf beide Handys',
      '💳 Kosten: Personen-Chips für „Wer hat bezahlt?"',
      '🎞️ <b>Erinnerungs-Album</b>: beendete Reisen bleiben ansehbar',
      '🔒 Zoom-Wackeln behoben'
    ]
  },
  {
    v: '1.5', title: 'Gemeinsam planen & Route', items: [
      '👫 <b>Live-Sync</b>: Reise per Link teilen, ohne Konto',
      '🗺️ Route-Tab mit Stopps, Ortssuche und GPS',
      '💸 Schulden per Tap als beglichen markieren'
    ]
  },
  {
    v: '1.0', title: 'Der Urlaubsplaner ist da', items: [
      '⏳ Countdown bis zum Urlaub',
      '🧳 Packliste mit Vorlagen und Konfetti',
      '💰 Kosten teilen mit Ausgleichsrechner',
      '📔 Urlaubstagebuch mit Fotos'
    ]
  }
];
function openNews() {
  document.getElementById('newsBody').innerHTML = `
    <div class="sheet-hd">
      <span class="sheet-title">✨ Was ist neu?</span>
      <button class="close-btn" onclick="closeSheet('newsSheet')">✕</button>
    </div>` +
    CHANGELOG.map((c, idx) => `<div class="card" style="padding:14px 16px${idx === 0 ? ';border:2px solid var(--sky-l)' : ''}">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px">
        <span style="background:${idx === 0 ? 'var(--sky)' : 'var(--border)'};color:${idx === 0 ? '#fff' : 'var(--text-2)'};font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px">v${c.v}</span>
        <span style="font-weight:800;font-size:14.5px">${c.title}</span>
      </div>
      ${c.items.map(i => `<div style="font-size:13.5px;padding:3px 0;line-height:1.45">${i}</div>`).join('')}
    </div>`).join('');
  openSheet('newsSheet');
  localStorage.setItem('urlaub-seenver', APP_VERSION);
}

// ═══ Navigation ═══
let tab = 'reise';
function go(t) {
  tab = t;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.querySelectorAll('.views > div').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + t).classList.add('active');
  document.getElementById('fab').style.display = (t === 'pack' || t === 'kosten' || t === 'karte') ? 'flex' : 'none';
  render();
}
function fabAction() {
  if (tab === 'pack') { resetPackForm(); openSheet('packSheet'); setTimeout(() => document.getElementById('pi-name').focus(), 350); }
  else if (tab === 'kosten') {
    if (!S.trip?.persons?.length) { alert('Bitte füge zuerst Mitreisende im Reise-Tab hinzu.'); return; }
    resetExpForm(); openSheet('expSheet');
  }
  else if (tab === 'karte') { resetStepSheet(); openSheet('stepSheet'); setTimeout(() => document.getElementById('st-q').focus(), 350); }
}

// ═══ Sheets ═══
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

// ═══ Utils ═══
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function fmtLong(d) { return new Date(d + 'T12:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' }); }
function fmtEur(n) { return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }
function daysBetween(a, b) { return Math.round((new Date(b + 'T12:00:00') - new Date(a + 'T12:00:00')) / 86400000); }
function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ═══ Render ═══
function render() {
  if (tab === 'reise') renderReise();
  else if (tab === 'karte') renderKarte();
  else if (tab === 'pack') renderPack();
  else if (tab === 'kosten') renderKosten();
  else renderDiary();
}

// ═══ TAB: ROUTE / KARTE (Polarsteps-Style) ═══
let map = null;
let stepSel = null, stepSearchTimer = null, geoResults = [];

function sortedSteps() {
  return (S.steps || []).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
}
function haversineKm(a, b) {
  const R = 6371, rad = x => x * Math.PI / 180;
  const dLat = rad(b.lat - a.lat), dLon = rad(b.lon - a.lon);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(rad(+a.lat)) * Math.cos(rad(+b.lat)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function routeKm(steps) {
  let km = 0;
  for (let i = 1; i < steps.length; i++) km += haversineKm(steps[i - 1], steps[i]);
  return Math.round(km);
}

function renderKarte() {
  const el = document.getElementById('v-karte');
  const steps = sortedSteps();
  const km = routeKm(steps);
  const countries = new Set(steps.map(s => s.country).filter(Boolean)).size;

  let html = `<div class="page-title">Route 🌍${steps.length ? `<span class="pt-sub">${steps.length} Stopps</span>` : ''}</div>
  <div class="cost-stats">
    <div class="cs-box"><div class="cs-num">${steps.length}</div><div class="cs-lbl">📍 Orte</div></div>
    <div class="cs-box"><div class="cs-num">${km}</div><div class="cs-lbl">🛣️ Kilometer</div></div>
    <div class="cs-box"><div class="cs-num">${countries || '–'}</div><div class="cs-lbl">🌍 Länder</div></div>
  </div>
  <div class="map-card"><div id="map"></div></div>`;

  if (!steps.length) {
    html += `<div class="empty" style="padding-top:16px"><span class="ei">🧭</span><div class="et">Noch keine Stopps</div><p>Tippe auf <b>+</b> und füge euren<br>ersten Ort zur Route hinzu.</p></div>`;
  } else {
    html += `<div class="section-label">Eure Stopps</div>`;
    html += steps.map((s, i) => `<div class="step-item" onclick="focusStep('${s.id}')">
      <div class="step-num">${i + 1}</div>
      <div style="flex:1;min-width:0">
        <div class="step-name">${esc(s.name)}${s.country ? ` <span style="font-weight:600;color:var(--text-3);font-size:12px">· ${esc(s.country)}</span>` : ''}</div>
        <div class="step-meta">${s.date ? fmtDate(s.date) : ''}${s.note ? (s.date ? ' · ' : '') + esc(s.note) : ''}</div>
      </div>
      <span class="pi-del" onclick="event.stopPropagation();deleteStep('${s.id}')">🗑</span>
    </div>`).join('');
  }
  el.innerHTML = html;
  initMap(steps);
}

function initMap(steps) {
  const div = document.getElementById('map');
  if (!div) return;
  if (!window.Globe) {
    div.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-2);font-size:13px;text-align:center;padding:20px">🌐 Für die Weltkugel wird Internet gebraucht.<br>Deine Stopps-Liste funktioniert trotzdem.</div>';
    return;
  }
  if (map) { try { map._destructor(); } catch {} map = null; }
  div.innerHTML = '';
  const pts = steps.map((s, i) => ({ lat: +s.lat, lng: +s.lon, i, name: s.name }));
  const arcs = [];
  for (let i = 1; i < pts.length; i++) {
    arcs.push({ startLat: pts[i - 1].lat, startLng: pts[i - 1].lng, endLat: pts[i].lat, endLng: pts[i].lng });
  }
  try {
    map = Globe()(div)
      .width(div.clientWidth)
      .height(360)
      .backgroundColor('#eaf4fb')
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .atmosphereColor('#7dd3fc')
      .atmosphereAltitude(0.18)
      .pointsData(pts)
      .pointColor(() => '#f59e0b')
      .pointAltitude(0.015)
      .pointRadius(0.45)
      .arcsData(arcs)
      .arcColor(() => '#0ea5e9')
      .arcStroke(0.6)
      .arcAltitudeAutoScale(0.4)
      .arcDashLength(0.5)
      .arcDashGap(0.2)
      .arcDashAnimateTime(2200)
      .htmlElementsData(pts)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.className = 'step-marker';
        el.textContent = d.i + 1;
        el.title = d.name;
        return el;
      })
      .htmlAltitude(0.02);
    const ctl = map.controls();
    ctl.autoRotate = pts.length === 0;
    ctl.autoRotateSpeed = 0.7;
    ctl.enableZoom = true;
    if (pts.length) {
      const cLat = pts.reduce((s, p) => s + p.lat, 0) / pts.length;
      const cLng = pts.reduce((s, p) => s + p.lng, 0) / pts.length;
      map.pointOfView({ lat: cLat, lng: cLng, altitude: pts.length > 1 ? 1.2 : 1.0 }, 0);
    } else {
      map.pointOfView({ lat: 30, lng: 10, altitude: 2.2 }, 0);
    }
  } catch {
    map = null;
    div.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-2);font-size:13px;text-align:center;padding:20px">Die Weltkugel kann auf diesem Gerät nicht angezeigt werden.</div>';
  }
}

function focusStep(id) {
  const steps = sortedSteps();
  const s = steps.find(x => x.id === id);
  if (!s || !map) return;
  map.pointOfView({ lat: +s.lat, lng: +s.lon, altitude: 0.5 }, 900);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function deleteStep(id) {
  S.steps = (S.steps || []).filter(s => s.id !== id);

}

function resetStepSheet() {
  stepSel = null; geoResults = [];
  document.getElementById('st-q').value = '';
  document.getElementById('st-results').innerHTML = '';
  document.getElementById('st-sel').textContent = '';
  document.getElementById('st-date').value = today();
  document.getElementById('st-note').value = '';
}
function stepSearchDebounced() {
  clearTimeout(stepSearchTimer);
  stepSearchTimer = setTimeout(stepSearch, 600);
}
async function stepSearch() {
  const q = document.getElementById('st-q').value.trim();
  const box = document.getElementById('st-results');
  if (q.length < 2) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="geo-item" style="color:var(--text-3)">Suche…</div>';
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&addressdetails=1&q=' + encodeURIComponent(q));
    geoResults = await r.json();
    box.innerHTML = geoResults.length
      ? geoResults.map((p, i) => `<div class="geo-item" onclick="pickPlace(${i})">📍 ${esc(p.display_name)}</div>`).join('')
      : '<div class="geo-item" style="color:var(--text-3)">Nichts gefunden</div>';
  } catch {
    box.innerHTML = '<div class="geo-item" style="color:var(--text-3)">Suche fehlgeschlagen – bist du online?</div>';
  }
}
function pickPlace(i) {
  const p = geoResults[i];
  if (!p) return;
  stepSel = { name: p.name || (p.display_name || '').split(',')[0], lat: +p.lat, lon: +p.lon, country: p.address?.country || '' };
  document.getElementById('st-sel').textContent = '✓ ' + stepSel.name + (stepSel.country ? ' · ' + stepSel.country : '');
  document.getElementById('st-results').innerHTML = '';
  document.getElementById('st-q').value = stepSel.name;
}
function useMyLocation() {
  if (!navigator.geolocation) { alert('Standort ist auf diesem Gerät nicht verfügbar.'); return; }
  document.getElementById('st-sel').textContent = '📡 Ermittle Standort…';
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    let name = 'Mein Standort', country = '';
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
      const j = await r.json();
      name = j.name || j.address?.city || j.address?.town || j.address?.village || (j.display_name || '').split(',')[0] || name;
      country = j.address?.country || '';
    } catch {}
    stepSel = { name, lat, lon, country };
    document.getElementById('st-sel').textContent = '✓ ' + name + (country ? ' · ' + country : '');
    document.getElementById('st-q').value = name;
  }, () => {
    document.getElementById('st-sel').textContent = '';
    alert('Standort konnte nicht ermittelt werden.');
  }, { enableHighAccuracy: true, timeout: 10000 });
}
function saveStep() {
  if (!stepSel) { alert('Bitte zuerst einen Ort suchen und antippen.'); return; }
  S.steps = S.steps || [];
  S.steps.push({ id: uid(), name: stepSel.name, lat: stepSel.lat, lon: stepSel.lon, country: stepSel.country, date: document.getElementById('st-date').value, note: document.getElementById('st-note').value.trim() });
  save(); closeSheet('stepSheet'); renderKarte();
}

let cdTimer = null;

function renderReise() {
  clearInterval(cdTimer);
  const el = document.getElementById('v-reise');

    el.innerHTML = `<div class="empty">
      <span class="ei">🏖️</span>

    </div>${memoriesHtml()}`;
    return;
  }
  const t = S.trip;
  const now = today();
  const toStart = daysBetween(now, t.startDate);
  const totalDays = daysBetween(t.startDate, t.endDate);
  const started = toStart <= 0;
  const ended = daysBetween(now, t.endDate) < 0;

    heroInner = `
      <div class="hero-kicker">Mitten im Urlaub</div>

      <div class="pbar-wrap"><div class="pbar" style="width:${progress}%"></div></div>`;
  } else {
    heroInner = `
      <div class="hero-kicker">Countdown läuft</div>
      <div class="hero-dest">${esc(t.destination)}</div>
      <div class="cd-units">
        <div class="cd-unit"><div class="cd-val" id="cd-d">–</div><div class="cd-key">Tage</div></div>
        <div class="cd-unit"><div class="cd-val" id="cd-h">–</div><div class="cd-key">Std</div></div>
        <div class="cd-unit"><div class="cd-val" id="cd-m">–</div><div class="cd-key">Min</div></div>
        <div class="cd-unit"><div class="cd-val" id="cd-s">–</div><div class="cd-key">Sek</div></div>
      </div>
      <div class="hero-sub" id="cd-sub"></div>`;
  }

  const packTotal = S.packing.length;
  const packDone = S.packing.filter(i => i.packed).length;
  const spent = S.expenses.filter(e => !e.transfer).reduce((s, e) => s + +e.amount, 0);
  const diaryFilled = tripDays().filter(d => hasEntry(S.diary[d])).length;

  el.innerHTML = `
    <div class="hero">
      <span class="hero-deco">${started && !ended ? '🌊' : ended ? '📸' : '✈️'}</span>
      ${heroInner}
    </div>

    <div class="bpass">
      <div class="bpass-top">
        <div class="bpass-route">
          <div class="bpass-pt"><div class="bpass-lbl">Von</div><div class="bpass-city">Zuhause</div></div>
          <div class="bpass-line">✈️</div>
          <div class="bpass-pt" style="text-align:right"><div class="bpass-lbl">Nach</div><div class="bpass-city">${esc(t.destination)}</div></div>

        <div class="bpass-cell"><div class="bc-v">${fmtDate(t.endDate)}</div><div class="bc-l">Rückkehr</div></div>
        <div class="bpass-cell"><div class="bc-v">${totalDays} Nächte</div><div class="bc-l">Dauer</div></div>

    </div>
  `;

    const target = new Date(t.startDate + 'T00:00:00');
    const tick = () => {
      const diff = target - new Date();
      if (diff <= 0) { clearInterval(cdTimer); renderReise(); return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor(diff / 3600000) % 24;
      const m = Math.floor(diff / 60000) % 60;
      const s = Math.floor(diff / 1000) % 60;
      const set = (id, v) => { const n = document.getElementById(id); if (n) n.textContent = v; };
      set('cd-d', d); set('cd-h', String(h).padStart(2, '0')); set('cd-m', String(m).padStart(2, '0')); set('cd-s', String(s).padStart(2, '0'));

    };
    tick();
    cdTimer = setInterval(tick, 1000);
  }
}

function archiveTrip() {
  if (!S.trip) return;
  if (!confirm('Reise ins Erinnerungs-Album verschieben?\nTagebuch, Fotos, Route und Kosten bleiben dort für immer ansehbar – danach kannst du eine neue Reise anlegen.')) return;
  S.archive = S.archive || [];
  S.archive.unshift({ id: uid(), trip: S.trip, budget: S.budget, expenses: S.expenses, diary: S.diary, steps: S.steps, savedAt: Date.now() });
  S.trip = null; S.budget = 0; S.expenses = []; S.diary = {}; S.steps = [];
  S.packing.forEach(i => { i.packed = false; });
  save();
  renderReise();
}

function memoriesHtml() {

  if (allPhotos.length) {

    html += `<div class="section-label">📔 Tagebuch</div>` + diaryDays.map(d => {

// ═══ Backup / Restore ═══
function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'urlaubsplaner-backup-' + today() + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (typeof d !== 'object' || d === null || !('trip' in d)) throw 0;
      if (!confirm('Backup importieren? Aktuelle Daten werden ersetzt.')) return;
      S = Object.assign({ trip: null, budget: 0, packing: [], expenses: [], diary: {}, steps: [], archive: [] }, d);
      migratePhotos(); save(); render();
    } catch { alert('Ungültige Backup-Datei.'); }
  };
  r.readAsText(file);
  input.value = '';
}

function renderPack() {
  const el = document.getElementById('v-pack');
  const items = S.packing;

  const tplHtml = `<div class="tpl-row">${Object.keys(PACK_TEMPLATES).map(k =>
    `<button class="tpl-btn" onclick="applyTemplate('${k.replace(/'/g, "\\'")}')">${k} +</button>`).join('')}</div>`;

  if (!items.length) {
    el.innerHTML = `<div class="page-title">Packliste 🧳</div>
      ${tplHtml}
      <div class="empty"><span class="ei">🧳</span><div class="et">Packliste ist leer</div><p>Nutze eine Vorlage oben oder<br>tippe auf <b>+</b> für eigene Artikel.</p></div>`;
    return;
  }
  const packed = items.filter(i => i.packed).length;
  const pct = Math.round((packed / items.length) * 100);
  const byCat = {};
  items.forEach(i => { (byCat[i.category] = byCat[i.category] || []).push(i); });

  let html = `<div class="page-title">Packliste 🧳<span class="pt-sub">${pct} %</span></div>
    ${tplHtml}
    <div class="pack-stat">
      <div class="pbar-wrap" style="flex:1"><div class="pbar" style="width:${pct}%;background:${pct === 100 ? 'var(--green)' : 'var(--sky)'}"></div></div>
      <span class="nums">${packed}/${items.length} ${pct === 100 ? '🎉' : 'gepackt'}</span>
    </div>`;
  for (const [cat, list] of Object.entries(byCat)) {
    const done = list.filter(i => i.packed).length;
    html += `<div>
      <div class="cat-hd">${CAT_ICONS[cat] || '📦'} ${esc(cat)} <span style="color:var(--text-3);font-weight:600">(${done}/${list.length})</span></div>
      ${list.map(i => `
        <div class="pack-item${i.packed ? ' done' : ''}" onclick="togglePack('${i.id}')">
          <div class="pi-check">✓</div>
          <span class="pi-name">${esc(i.name)}</span>
          ${i.qty > 1 ? `<span class="pi-qty">×${i.qty}</span>` : ''}
          <span class="pi-del" onclick="event.stopPropagation();deletePack('${i.id}')">🗑</span>
        </div>`).join('')}
    </div>`;
  }
  el.innerHTML = html;
}

function applyTemplate(key) {
  const tpl = PACK_TEMPLATES[key];
  if (!tpl) return;
  const existing = new Set(S.packing.map(i => i.name.toLowerCase()));
  let added = 0;
  tpl.forEach(([name, qty, cat]) => {
    if (existing.has(name.toLowerCase())) return;
    S.packing.push({ id: uid(), name, qty, category: cat, packed: false });
    added++;
  });
  save(); renderPack();
  if (!added) alert('Alle Artikel dieser Vorlage sind schon auf der Liste.');
}

function togglePack(id) {
  const item = S.packing.find(i => i.id === id);
  if (!item) return;
  const wasComplete = S.packing.every(i => i.packed);
  item.packed = !item.packed;
  save(); renderPack();
  if (!wasComplete && item.packed && S.packing.every(i => i.packed)) confetti();
}
function deletePack(id) { S.packing = S.packing.filter(i => i.id !== id); save(); renderPack(); }
function resetPackForm() { document.getElementById('pi-name').value = ''; document.getElementById('pi-qty').value = '1'; }
function savePack() {
  const name = document.getElementById('pi-name').value.trim();
  if (!name) { alert('Bitte Artikelname eingeben.'); return; }
  S.packing.push({ id: uid(), name, qty: parseInt(document.getElementById('pi-qty').value) || 1, category: document.getElementById('pi-cat').value, packed: false });
  save(); closeSheet('packSheet'); renderPack();
}

function confetti() {
  const emo = ['🎉', '🎊', '🧳', '☀️', '🏖️', '✨'];
  for (let i = 0; i < 36; i++) {
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = emo[Math.floor(Math.random() * emo.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
    s.style.animationDelay = (Math.random() * .5) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 4600);
  }
}

function calcBalances() {
  const persons = S.trip?.persons || [];
  const bal = {};
  persons.forEach(p => (bal[p] = { paid: 0, share: 0 }));
  S.expenses.forEach(e => {
    if (e.paidBy === JOINT) return; // Gemeinsame Kasse: niemand schuldet niemandem etwas
    const split = e.splitWith?.length ? e.splitWith : persons;
    const share = +e.amount / split.length;
    if (bal[e.paidBy]) bal[e.paidBy].paid += +e.amount;
    split.forEach(p => { if (bal[p]) bal[p].share += share; });
  });
  return bal;
}

function calcSettlements() {
  const persons = S.trip?.persons || [];
  if (persons.length < 2) return [];
  const bals = calcBalances();
  const cred = [], debt = [];
  persons.forEach(p => {
    const b = bals[p].paid - bals[p].share;
    if (b > 0.005) cred.push([p, b]);
    else if (b < -0.005) debt.push([p, -b]);
  });
  const txns = [];
  let ci = 0, di = 0;
  while (ci < cred.length && di < debt.length) {
    const amt = Math.min(cred[ci][1], debt[di][1]);
    txns.push({ from: debt[di][0], to: cred[ci][0], amount: Math.round(amt * 100) / 100 });
    cred[ci][1] -= amt; debt[di][1] -= amt;
    if (cred[ci][1] < 0.005) ci++;
    if (debt[di][1] < 0.005) di++;
  }
  return txns;
}

function toggleSplit(i) { expSplit.has(i) ? expSplit.delete(i) : expSplit.add(i); renderSplitChips(); }

function resetExpForm(exp) {
  expPersons = S.trip?.persons || [];
  editingExpId = exp ? exp.id : null;
  document.getElementById('ex-title').textContent = exp ? 'Ausgabe bearbeiten ✏️' : 'Ausgabe eintragen 💶';
  document.getElementById('ex-desc').value = exp ? exp.desc : '';
  document.getElementById('ex-amt').value = exp ? exp.amount : '';
  document.getElementById('ex-date').value = exp?.date || today();
  expPayer = exp ? (exp.paidBy === JOINT ? expPersons.length : expPersons.indexOf(exp.paidBy)) : -1;
  const splitNames = exp ? (exp.splitWith?.length ? exp.splitWith : expPersons) : expPersons;
  expSplit = new Set(expPersons.map((p, i) => splitNames.includes(p) ? i : -1).filter(i => i >= 0));
  renderPayerChips();
  renderSplitChips();
  document.getElementById('ex-cat').value = exp?.category && EXP_ICONS[exp.category] ? exp.category : 'Essen & Trinken';

function editExp(id) {
  const exp = S.expenses.find(e => e.id === id);
  if (!exp || exp.transfer) return;
  resetExpForm(exp);
  openSheet('expSheet');
}
function saveExp() {
  const desc = document.getElementById('ex-desc').value.trim();
  const amount = parseFloat(document.getElementById('ex-amt').value);
  if (!desc || isNaN(amount) || amount <= 0) { alert('Bitte Beschreibung und Betrag eingeben.'); return; }
  if (expPayer < 0) { alert('Bitte antippen, wer bezahlt hat. 💳'); return; }
  if (!expSplit.size) { alert('Bitte auswählen, für wen die Ausgabe war. 🤝'); return; }
  const splitWith = [...expSplit].sort().map(i => expPersons[i]);
  const data = { desc, amount, date: document.getElementById('ex-date').value, paidBy: expPayer === expPersons.length ? JOINT : expPersons[expPayer], splitWith, category: document.getElementById('ex-cat').value };
  if (editingExpId) {
    const exp = S.expenses.find(e => e.id === editingExpId);
    if (exp) Object.assign(exp, data);
  } else {
    S.expenses.push(Object.assign({ id: uid() }, data));
  }
  save(); closeSheet('expSheet'); renderKosten();
}
function settleUp(i) {
  const s = calcSettlements()[i];
  if (!s) return;
  if (!confirm(`${s.from} hat ${fmtEur(s.amount)} an ${s.to} zurückgezahlt?`)) return;
  S.expenses.push({ id: uid(), desc: `${s.from} → ${s.to}`, amount: s.amount, date: today(), paidBy: s.from, splitWith: [s.to], category: 'Ausgleich', transfer: true });
  save(); renderKosten();
}
function deleteExp(id) {
  if (!confirm('Ausgabe löschen?')) return;
  S.expenses = S.expenses.filter(e => e.id !== id);
  save(); renderKosten();
}

const photoFetching = new Set();
async function fetchPhoto(p) {
  if (!sync || !p.bin || PC[p.id] || photoFetching.has(p.id)) return;
  photoFetching.add(p.id);
  try {
    const r = await fetch(SYNC_API + '/' + p.bin, { headers: { 'Security-key': sync.key } });
    if (r.ok) {
      const j = await r.json();
      if (j && j.d) { PC[p.id] = j.d; savePC(); photoLoaded(p); }
    }
  } catch {}
  photoFetching.delete(p.id);
}
function photoLoaded(p) {
  document.querySelectorAll(`.photo-ph[data-pid="${p.id}"]`).forEach(el => {
    const d = el.dataset.day;
    if (d) {
      const g = document.getElementById('pg-' + d);
      if (g) { g.innerHTML = photoGridHtml(d); return; }
    }
    el.outerHTML = `<div class="photo-cell"><img src="${PC[p.id]}" alt="" onclick="openLightboxP('${p.id}')" /></div>`;
  });
}

// Eigene Fotos hochladen, damit der Partner sie sehen kann (je Foto ein eigenes Bin)
let uploadingPhotos = false;
async function uploadPendingPhotos() {
  if (!sync || uploadingPhotos) return;
  uploadingPhotos = true;
  let changed = false;
  try {
    const entries = [...Object.values(S.diary || {}), ...(S.archive || []).flatMap(a => Object.values(a.diary || {}))];
    for (const e of entries) {
      for (const p of (e.photos || [])) {
        if (!p || p.bin || !PC[p.id]) continue;
        const r = await fetch(SYNC_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Security-key': sync.key, 'Private': 'true' }, body: JSON.stringify({ d: PC[p.id] }) });
        const j = await r.json().catch(() => null);
        if (r.ok && j?.id) { p.bin = j.id; changed = true; }
      }
    }
  } catch {}
  uploadingPhotos = false;
  if (changed) save();
}

function tripDays() {
  if (!S.trip) return [];
  const days = [];
  const cur = new Date(S.trip.startDate + 'T12:00:00');
  const end = new Date(S.trip.endDate + 'T12:00:00');
  while (cur <= end) {
    days.push(cur.toISOString().slice(0, 10));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

function toggleDay(d) {
  document.getElementById('card-' + d)?.classList.toggle('open');
}

function setDF(d, field, val) {
  if (!S.diary[d]) S.diary[d] = {};
  S.diary[d][field] = val;
  save();
  const entry = S.diary[d];
  const card = document.getElementById('card-' + d);
  if (card) {
    const prev = card.querySelector('.dh-preview');
    if (prev) {
      const dayPlaces = (S.steps || []).filter(s => s.date === d).map(s => s.name).join(', ');
      const p = [dayPlaces ? '📍 ' + dayPlaces : '', entry.weather, entry.activities ? entry.activities.slice(0, 40) : ''].filter(Boolean).join(' ');
      prev.textContent = p || fmtLong(d);
    }
    const moodEl = card.querySelector('.dh-mood');
    if (moodEl) moodEl.textContent = entry.mood || (hasEntry(entry) ? '✅' : '📔');
    if (field === 'weather') card.querySelectorAll('.wopt').forEach(b => b.classList.toggle('sel', b.textContent.trim() === val));
    if (field === 'mood') card.querySelectorAll('.mopt').forEach(b => b.classList.toggle('sel', b.textContent.trim() === val));
  }
}

function addPhotos(d, input) {
  const files = [...input.files];
  input.value = '';
  if (!files.length) return;
  files.forEach(file => {
    const imgEl = new Image();
    const objUrl = URL.createObjectURL(file);
    imgEl.onload = () => {
      const MAX = 800;
      let w = imgEl.width, h = imgEl.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(imgEl, 0, 0, w, h);
      URL.revokeObjectURL(objUrl);
      // Unter ~90 KB bleiben, damit jedes Foto in ein Sync-Paket passt
      let q = 0.62, data = c.toDataURL('image/jpeg', q);
      while (data.length > 90000 && q > 0.32) { q -= 0.1; data = c.toDataURL('image/jpeg', q); }
      const id = 'p' + uid();
      PC[id] = data;
      savePC();
      if (!S.diary[d]) S.diary[d] = {};
      S.diary[d].photos = S.diary[d].photos || [];
      S.diary[d].photos.push({ id, bin: null });
      save();
      const grid = document.getElementById('pg-' + d);
      if (grid) grid.innerHTML = photoGridHtml(d);
    };
    imgEl.src = objUrl;
  });
}

function removePhoto(d, i) {
  const photos = S.diary[d]?.photos;
  if (!photos) return;
  const [p] = photos.splice(i, 1);
  if (p) {
    delete PC[p.id];
    savePC();
    if (p.bin && sync) fetch(SYNC_API + '/' + p.bin, { method: 'DELETE', headers: { 'Security-key': sync.key } }).catch(() => {});
  }
  save();
  const grid = document.getElementById('pg-' + d);
  if (grid) grid.innerHTML = photoGridHtml(d);
}

// ═══ LIVE-SYNC (gemeinsam planen) ═══
const SYNC_KEY = 'urlaub-sync';
const SYNC_API = 'https://extendsclass.com/api/json-storage/bin';
let sync = null;            // { bin, key }
let pushTimer = null;
let applyingRemote = false;
let syncBusy = false;

function loadSyncCfg() { try { const d = localStorage.getItem(SYNC_KEY); if (d) sync = JSON.parse(d); } catch {} }
function saveSyncCfg() { sync ? localStorage.setItem(SYNC_KEY, JSON.stringify(sync)) : localStorage.removeItem(SYNC_KEY); }
function syncCode() { return sync ? sync.bin + '.' + sync.key : ''; }

function setSyncStatus(st) {
  const el = document.getElementById('syncDot');
  if (!el) return;
  el.textContent = st === 'ok' ? '🟢 Synchron' : st === 'sync' ? '🔄 Synchronisiere…' : '⚠️ Offline';
}

// Payload enthält nur Foto-Referenzen ({id, bin}), die Bilddaten liegen in eigenen Bins
function syncPayload() {
  return JSON.stringify(S);
}
function applyRemote(remote) {
  applyingRemote = true;
  // Eigene, noch nicht hochgeladene Fotos dürfen nicht verloren gehen
  const localPending = {};
  Object.entries(S.diary || {}).forEach(([d, e]) => {
    (e.photos || []).forEach(p => {
      if (p && typeof p === 'object' && !p.bin && PC[p.id]) (localPending[d] = localPending[d] || []).push(p);
    });
  });
  S = Object.assign({ trip: null, budget: 0, packing: [], expenses: [], diary: {}, steps: [], archive: [] }, remote);
  migratePhotos();
  Object.entries(localPending).forEach(([d, list]) => {
    S.diary[d] = S.diary[d] || {};
    S.diary[d].photos = S.diary[d].photos || [];
    list.forEach(p => { if (!S.diary[d].photos.some(q => q.id === p.id)) S.diary[d].photos.push(p); });
  });
  // Verwaiste Cache-Einträge aufräumen (z. B. vom Partner gelöschte Fotos)
  const refIds = new Set();
  const collect = e => (e?.photos || []).forEach(p => p?.id && refIds.add(p.id));
  Object.values(S.diary || {}).forEach(collect);
  (S.archive || []).forEach(a => Object.values(a.diary || {}).forEach(collect));
  let purged = false;
  Object.keys(PC).forEach(k => { if (!refIds.has(k)) { delete PC[k]; purged = true; } });
  if (purged) savePC();
  save();
  applyingRemote = false;
  render();
  uploadPendingPhotos();
}

async function syncApi(method, body) {
  const r = await fetch(SYNC_API + '/' + sync.bin, {
    method,
    headers: Object.assign({ 'Security-key': sync.key }, body ? { 'Content-Type': 'application/json' } : {}),
    body
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function syncPush() {
  if (!sync) return;
  setSyncStatus('sync');
  try {
    await uploadPendingPhotos();
    await syncApi('PUT', syncPayload());
    setSyncStatus('ok');
  }
  catch { setSyncStatus('err'); }
}

async function syncPull() {
  if (!sync || syncBusy) return;
  syncBusy = true;
  setSyncStatus('sync');
  try {
    const remote = await syncApi('GET');
    if ((remote.updatedAt || 0) > (S.updatedAt || 0)) applyRemote(remote);
    setSyncStatus('ok');
  } catch { setSyncStatus('err'); }
  syncBusy = false;
}

async function startSync() {
  const key = [...crypto.getRandomValues(new Uint8Array(12))].map(b => b.toString(16).padStart(2, '0')).join('');
  try {
    const r = await fetch(SYNC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Security-key': key, 'Private': 'true' },
      body: syncPayload()
    });
    const j = await r.json();
    if (!r.ok || !j.id) throw 0;
    sync = { bin: j.id, key };
    saveSyncCfg();
    renderReise();
    shareSync();
  } catch {
    alert('Sync konnte nicht gestartet werden. Bitte Internetverbindung prüfen und erneut versuchen.');
  }
}

async function joinSync(code) {
  code = (code || '').trim();
  const m = code.match(/^([a-zA-Z0-9]+)\.([a-f0-9]+)$/);
  if (!m) { alert('Ungültiger Code. Format: xxxxxxx.xxxxxxxxxxxx'); return; }
  const prev = sync;
  sync = { bin: m[1], key: m[2] };
  try {
    const remote = await syncApi('GET');
    saveSyncCfg();
    applyRemote(remote);
    go('reise');
    alert('Verbunden! Ihr plant jetzt gemeinsam. 🎉');
  } catch {
    sync = prev;
    alert('Code nicht gefunden oder falsch geschrieben.');
  }
}

function joinPrompt() {
  const c = prompt('Sync-Code eingeben (z.B. aus dem geteilten Link hinter #join=):');
  if (c) joinSync(c);
}

function stopSync() {
  if (!confirm('Live-Sync beenden? Deine Daten bleiben auf diesem Handy erhalten.')) return;
  sync = null;
  saveSyncCfg();
  renderReise();
}

async function shareSync() {
  const url = location.origin + location.pathname + '#join=' + syncCode();
  const text = 'Plane unseren Urlaub mit! 🏝️ Öffne den Link, dann teilen wir Packliste, Kosten & Tagebuch: ';
  if (navigator.share) {
    try { await navigator.share({ title: 'Urlaubsplaner', text, url }); return; } catch {}
  }
  try { await navigator.clipboard.writeText(text + url); alert('Link kopiert! Schick ihn deiner Freundin. 💌'); }
  catch { prompt('Diesen Link teilen:', text + url); }
}

let syncDetailsOpen = false;
function toggleSyncDetails() {
  syncDetailsOpen = !syncDetailsOpen;
  const d = document.getElementById('syncDetails');
  const c = document.getElementById('syncCaret');
  if (d) d.style.display = syncDetailsOpen ? 'block' : 'none';
  if (c) c.style.transform = syncDetailsOpen ? 'rotate(180deg)' : '';
}
function syncCardHtml() {
  if (sync) {
    return `<div class="card" style="padding:11px 14px">
      <div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="toggleSyncDetails()">
        <span style="font-size:19px">👫</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:13.5px">Gemeinsam planen</div>
          <div id="syncDot" style="font-size:11.5px;font-weight:700;color:var(--text-2)">🟢 Synchron</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();shareSync()">💌</button>
        <span id="syncCaret" class="dh-caret" style="transition:transform .25s${syncDetailsOpen ? ';transform:rotate(180deg)' : ''}">▼</span>
      </div>
      <div id="syncDetails" style="display:${syncDetailsOpen ? 'block' : 'none'};margin-top:10px">
        <p style="font-size:12px;color:var(--text-2);margin-bottom:8px">Reise, Route, Packliste, Kosten &amp; Tagebuch – inklusive Fotos – landen automatisch auf beiden Handys.</p>
        <div style="font-size:12px;background:var(--bg);border-radius:8px;padding:7px 10px;margin-bottom:9px;word-break:break-all"><b>Code:</b> <span style="font-family:monospace">${esc(syncCode())}</span></div>
        <div class="tool-row" style="margin-top:0">
          <button class="btn btn-ghost btn-sm" onclick="syncPull()">🔄 Aktualisieren</button>
          <button class="btn btn-danger btn-sm" onclick="stopSync()">Beenden</button>
        </div>
      </div>
    </div>`;
  }
  return `<div class="card" style="padding:12px 14px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:19px">👫</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:13.5px">Gemeinsam planen</div>
        <div style="font-size:11.5px;color:var(--text-2)">Alles live auf beiden Handys – ohne Konto</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="startSync()">🔗 Starten</button>
      <button class="btn btn-ghost btn-sm" onclick="joinPrompt()">Code</button>
    </div>
  </div>`;
}

// ═══ Init ═══
load();
loadSyncCfg();
render();

// Beitritt über geteilten Link (#join=CODE)
const joinMatch = location.hash.match(/#join=([a-zA-Z0-9.]+)/);
if (joinMatch) {
  history.replaceState(null, '', location.pathname + location.search);
  if (confirm('Geteilte Reise laden? Deine aktuellen Daten auf diesem Gerät werden ersetzt.')) joinSync(joinMatch[1]);
}

// „Was ist neu?" einmalig nach jedem Update zeigen (nicht beim allerersten Start)
if (localStorage.getItem('urlaub-seenver') !== APP_VERSION) {
  if (S.trip || S.packing.length || Object.keys(S.diary).length) setTimeout(openNews, 600);
  else localStorage.setItem('urlaub-seenver', APP_VERSION);
}

if (sync) syncPull();
setInterval(() => { if (sync && document.visibilityState === 'visible') syncPull(); }, 45000);
document.addEventListener('visibilitychange', () => { if (sync && document.visibilityState === 'visible') syncPull(); });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
